<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple Tap - One-Tap Action Ninja</title>
    <!-- Load Orbitron fonts for a sci-fi neon style and Outfit for clean copy -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Base CSS reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #100624 0%, #030107 100%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Disables double-tap zoom/scrolling gestures */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Responsive container forcing 16:9 aspect ratio */
        #game-container {
            position: relative;
            box-shadow: 0 0 50px rgba(186, 85, 211, 0.35);
            border: 2px solid rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* HTML Leaderboard Overlay Styles */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 3, 18, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-family: 'Outfit', sans-serif;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .hud-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .leaderboard-box {
            width: 90%;
            max-width: 460px;
            background: rgba(21, 8, 45, 0.95);
            border: 2px solid #bd00ff;
            box-shadow: 0 0 30px rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: 90%;
        }
        .leaderboard-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
            margin-bottom: 18px;
            letter-spacing: 1px;
        }
        .leaderboard-list {
            width: 100%;
            overflow-y: auto;
            margin-bottom: 16px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            border: 1px solid rgba(186, 85, 211, 0.2);
            padding: 8px;
            flex-grow: 1;
            min-height: 150px;
        }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            font-weight: 600;
        }
        .leaderboard-item.top-rank {
            color: #ffaa00;
        }
        .leaderboard-item.current-player {
            background: rgba(186, 85, 211, 0.2);
            border: 1px solid #bd00ff;
            border-radius: 4px;
            color: #ffffff;
        }
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .leaderboard-loading {
            text-align: center;
            padding: 30px 0;
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }
        .submit-container {
            width: 100%;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px dashed rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            text-align: center;
        }
        .submit-prompt {
            font-size: 13px;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .submit-prompt span {
            color: #00ffff;
            font-weight: 800;
        }
        .submit-form-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        #player-name-input {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(186, 85, 211, 0.5);
            border-radius: 4px;
            color: #ffffff;
            padding: 6px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            text-align: center;
            outline: none;
            width: 150px;
        }
        #player-name-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }
        #submit-score-btn {
            background: #bd00ff;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 6px 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #submit-score-btn:hover {
            background: #d333ff;
        }
        #close-leaderboard-btn, #close-shop-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            padding: 8px 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #close-leaderboard-btn:hover, #close-shop-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #ffffff;
        }

        /* Leaderboard Button on Game Screens */
        .hud-action-btn {
            position: absolute;
            background: rgba(21, 8, 45, 0.85);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 6px;
            color: #00ffff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
            z-index: 80;
        }
        .hud-action-btn:hover {
            background: #00ffff;
            color: #100624;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }
        .hud-action-btn.hidden {
            display: none;
        }

        /* Shop Overlay Styles */
        .shop-box {
            width: 90%;
            max-width: 480px;
            background: rgba(21, 8, 45, 0.95);
            border: 2px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-height: 90%;
        }
        .shop-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: #bd00ff;
            text-shadow: 0 0 10px rgba(186, 85, 211, 0.6);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .shop-currency {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #ffd700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.4);
            margin-bottom: 16px;
        }
        .shop-items-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 4px;
            flex-grow: 1;
        }
        .shop-item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 8px;
            transition: all 0.2s;
            width: 100%;
        }
        .shop-item-card.selected {
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.15);
        }
        .shop-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }
        .shop-item-preview {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            border: 2px solid #ffffff;
            box-shadow: 0 0 8px currentColor;
        }
        .shop-item-details {
            display: flex;
            flex-direction: column;
        }
        .shop-item-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: #ffffff;
        }
        .shop-item-desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2px;
        }
        .shop-item-btn {
            background: #00ffff;
            border: none;
            border-radius: 4px;
            color: #100624;
            padding: 6px 12px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
        }
        .shop-item-btn:hover:not(:disabled) {
            background: #ffffff;
            box-shadow: 0 0 8px #ffffff;
        }
        .shop-item-btn:disabled {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.4);
            cursor: default;
        }
        .shop-item-btn.equipped {
            background: #bd00ff;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(186, 85, 211, 0.4);
        }

        /* Orientation warning overlay styles */
        #orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, #100624 0%, #030107 100%);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            padding: 24px;
        }
        @media (orientation: portrait) {
            #orientation-warning {
                display: flex;
            }
        }
        .warning-content {
            max-width: 400px;
        }
        .phone-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: rotatePhone 2.2s infinite ease-in-out;
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            40% { transform: rotate(-90deg); }
            80% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }
        .warning-content h2 {
            font-size: 22px;
            font-weight: 900;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .warning-content p {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        /* Optimize HUD Overlays for small/mobile landscape screens */
        @media (max-height: 480px) {
            .leaderboard-box, .shop-box {
                padding: 12px 18px;
                border-radius: 8px;
                max-height: 96%;
            }
            .leaderboard-title, .shop-title {
                font-size: 18px;
                margin-bottom: 6px;
            }
            .shop-currency {
                font-size: 11px;
                margin-bottom: 8px;
            }
            .leaderboard-list {
                min-height: 80px;
                margin-bottom: 8px;
                padding: 4px;
            }
            .leaderboard-item {
                padding: 5px 8px;
                font-size: 12px;
            }
            .submit-container {
                margin-bottom: 8px;
                padding: 6px 10px;
            }
            .submit-prompt {
                font-size: 11px;
                margin-bottom: 4px;
            }
            #player-name-input {
                font-size: 11px;
                padding: 4px 8px;
                width: 120px;
            }
            #submit-score-btn {
                font-size: 11px;
                padding: 4px 10px;
            }
            #close-leaderboard-btn, #close-shop-btn {
                font-size: 11px;
                padding: 6px 18px;
            }
            .shop-items-grid {
                gap: 6px;
                margin-bottom: 8px;
            }
            .shop-item-card {
                padding: 6px 10px;
            }
            .shop-item-preview {
                width: 24px;
                height: 24px;
            }
            .shop-item-name {
                font-size: 11px;
            }
            .shop-item-desc {
                font-size: 9px;
            }
            .shop-item-btn {
                padding: 4px 8px;
                font-size: 9px;
                min-width: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- Orientation warning overlay for mobile portrait viewports -->
    <div id="orientation-warning">
        <div class="warning-content">
            <div class="phone-icon">🔄</div>
            <h2>ROTATE YOUR DEVICE</h2>
            <p>Please rotate your screen to Landscape to play Purple Tap!</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- HTML Leaderboard Overlay -->
        <div id="leaderboard-overlay" class="hud-overlay">
            <div class="leaderboard-box">
                <h2 class="leaderboard-title">🏆 GLOBAL LEADERBOARD</h2>
                <div id="leaderboard-list" class="leaderboard-list">
                    <div class="leaderboard-loading">Loading scores...</div>
                </div>
                
                <!-- Name Submission Form -->
                <div id="score-submit-container" class="submit-container hidden">
                    <p class="submit-prompt">You scored <span id="submit-score-val">0</span>! Submit your nickname:</p>
                    <div class="submit-form-row">
                        <input type="text" id="player-name-input" maxlength="10" placeholder="NICKNAME" />
                        <button id="submit-score-btn">SUBMIT</button>
                    </div>
                </div>
                
                <button id="close-leaderboard-btn">CLOSE</button>
            </div>
        </div>

        <!-- HTML Shop Overlay -->
        <div id="shop-overlay" class="hud-overlay">
            <div class="shop-box">
                <h2 class="shop-title">🛒 NINJA GEAR SHOP</h2>
                <div class="shop-currency">YOUR CHIPS: <span id="shop-chips-count">0</span> 🪙</div>
                <div id="shop-items-list" class="shop-items-grid">
                    <!-- Cards will be generated dynamically -->
                </div>
                <button id="close-shop-btn">CLOSE</button>
            </div>
        </div>

        <!-- Start Screen Action Buttons -->
        <button id="show-leaderboard-start" class="hud-action-btn" style="bottom: 25px; left: 30px;">🏆 LEADERBOARD</button>
        <button id="show-shop-start" class="hud-action-btn" style="bottom: 25px; right: 30px;">🛒 SHOP</button>
    </div>

    <script>
        // --- VIEWPORT SCALING & DYNAMIC RESIZING ---
        function resizeGame() {
            const container = document.getElementById('game-container');
            if (!container) return;
            const w = window.innerWidth;
            const h = window.innerHeight;
            const targetRatio = 16 / 9;
            const currentRatio = w / h;
            
            if (currentRatio > targetRatio) {
                // Viewport is wider than 16:9
                container.style.height = h + 'px';
                container.style.width = (h * targetRatio) + 'px';
            } else {
                // Viewport is taller than 16:9
                container.style.width = w + 'px';
                container.style.height = (w / targetRatio) + 'px';
            }
        }
        window.addEventListener('resize', resizeGame);
        window.addEventListener('load', resizeGame);
        // Execute immediately to avoid jumpy layouts
        resizeGame();

        // --- CONFIGURATION AND INITIALIZATION ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Internal logical resolution of the Canvas (independent from physical display size)
        const LOGICAL_WIDTH = 1280;
        const LOGICAL_HEIGHT = 720;
        canvas.width = LOGICAL_WIDTH;
        canvas.height = LOGICAL_HEIGHT;

        // Dynamic primary and secondary neon colors (shift in Phase 3)
        let primaryColor = '#bd00ff';
        let secondaryColor = '#00ffff';

        // Helper function to convert Hex color to RGB string
        function hexToRgb(hex) {
            let shorthandRegex = /^#?([a-f\d])([a-f\d])([a-f\d])$/i;
            hex = hex.replace(shorthandRegex, (m, r, g, b) => r + r + g + g + b + b);
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255, 255, 255';
        }

        // Collision detection helper
        function checkCollision(p, obj, isCollectible) {
            let padX = isCollectible ? 4 : 12;
            let padY = isCollectible ? 4 : 12;
            return (
                p.x + padX < obj.x + obj.w &&
                p.x + p.width - padX > obj.x &&
                p.y + padY < obj.y + obj.h &&
                p.y + p.height - padY > obj.y
            );
        }

        // --- AUDIO SYNTHESIZER ENGINE (Web Audio API) ---
        // Generates arcade sound effects in real-time without external asset dependencies
        const Sound = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    BGM.init(this.ctx);
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playJump() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(580, this.ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playDash() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(260, this.ctx.currentTime + 0.2);
                
                // Lowpass filter sweeps the frequencies to give the dash a futuristic depth
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            },
            playDeath() {
                this.init();
                if (!this.ctx) return;

                // White noise generator for the impact explosion
                let bufferSize = this.ctx.sampleRate * 0.45;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                let noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(900, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.45);
                
                let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.28, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.45);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
                noise.stop(this.ctx.currentTime + 0.45);
                
                // Sub-bass sine wave thump
                let subOsc = this.ctx.createOscillator();
                let subGain = this.ctx.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.setValueAtTime(130, this.ctx.currentTime);
                subOsc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 0.35);
                
                subGain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                subGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
                
                subOsc.connect(subGain);
                subGain.connect(this.ctx.destination);
                subOsc.start();
                subOsc.stop(this.ctx.currentTime + 0.35);
            },
            playScore() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, this.ctx.currentTime); // B5
                osc.frequency.setValueAtTime(1318.51, this.ctx.currentTime + 0.07); // E6
                
                gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.22);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.22);
            },
            playKill() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.12);
                
                gain.gain.setValueAtTime(0.14, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.12);
            },
            playChip() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                const pentatonic = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50, 1174.66, 1318.51, 1567.98, 1760.00, 2093.00];
                let index = Math.min(consecutiveChips, pentatonic.length - 1);
                let baseFreq = pentatonic[index];
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq, this.ctx.currentTime);
                osc.frequency.setValueAtTime(baseFreq * 1.5, this.ctx.currentTime + 0.05);
                
                // Volume envelope slightly louder for high combos
                let vol = 0.06 + Math.min(0.04, consecutiveChips * 0.005);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.18);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.18);
            },
            playStyleUp(rank) {
                this.init();
                if (!this.ctx) return;
                
                const ranks = ['D', 'C', 'B', 'A', 'S', 'SS', 'SSS'];
                let rankIndex = ranks.indexOf(rank);
                if (rankIndex < 1) rankIndex = 1;
                
                let roots = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 523.25];
                let root = roots[rankIndex];
                let chord = [root, root * 1.25, root * 1.5, root * 2.0];
                
                chord.forEach((freq, idx) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime + idx * 0.06);
                    
                    gain.gain.setValueAtTime(0.0, this.ctx.currentTime + idx * 0.06);
                    gain.gain.linearRampToValueAtTime(0.06, this.ctx.currentTime + idx * 0.06 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + idx * 0.06 + 0.25);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.start(this.ctx.currentTime + idx * 0.06);
                    osc.stop(this.ctx.currentTime + idx * 0.06 + 0.25);
                });
            },
            playNearMiss() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(950, this.ctx.currentTime + 0.18);
                
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.18);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.18);
            },
            playPowerup() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.15);
                osc.frequency.exponentialRampToValueAtTime(1760, this.ctx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            playShatter() {
                this.init();
                if (!this.ctx) return;
                // Highpass filtered white noise burst for shield breaking
                let bufferSize = this.ctx.sampleRate * 0.25;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                let noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(2000, this.ctx.currentTime);
                
                let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.25);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
                noise.stop(this.ctx.currentTime + 0.25);
            }

        // --- PROCEDURAL BGM ENGINE ---
        // Generates a dynamic 120 BPM Synthwave bassline that morphs in slow-motion
        const BGM = {
            ctx: null,
            nextNoteTime: 0.0,
            noteIndex: 0,
            isPlaying: false,
            timerId: null,
            activeNodes: [],
            
            // Bass line sequence frequencies: E1, E1, E2, E1, G1, G1, G2, G1, A1, A1, A2, A1, C2, C2, C3, C2
            notes: [41.20, 41.20, 82.40, 41.20, 49.00, 49.00, 98.00, 49.00, 55.00, 55.00, 110.00, 55.00, 65.41, 65.41, 130.81, 65.41],
            
            init(audioCtx) {
                this.ctx = audioCtx;
            },
            
            start() {
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.nextNoteTime = this.ctx.currentTime + 0.1;
                this.noteIndex = 0;
                this.tick();
            },
            
            stop() {
                this.isPlaying = false;
                if (this.timerId) {
                    clearTimeout(this.timerId);
                    this.timerId = null;
                }
                this.activeNodes.forEach(node => {
                    try { node.stop(); } catch(e) {}
                });
                this.activeNodes = [];
            },
            
            tick() {
                if (!this.isPlaying) return;
                
                let scheduleAheadTime = 0.2; // Schedules 200ms ahead
                while (this.nextNoteTime < this.ctx.currentTime + scheduleAheadTime) {
                    this.scheduleNote(this.noteIndex, this.nextNoteTime);
                    
                    // Beat tempo expands inversely proportional to the slow-mo factor
                    let stepDuration = 0.22 * (1.0 / timeScale);
                    this.nextNoteTime += stepDuration;
                    this.noteIndex = (this.noteIndex + 1) % this.notes.length;
                }
                
                this.timerId = setTimeout(() => this.tick(), 50);
            },
            
            scheduleNote(index, time) {
                if (!this.isPlaying || !this.ctx) return;
                
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                let filter = this.ctx.createBiquadFilter();
                
                osc.type = 'sawtooth';
                let freq = this.notes[index];
                
                // Shifts bass down by 1 full octave during slow-mo for a heavy, distorted timeline effect
                if (timeScale < 0.5) {
                    freq = freq * 0.5;
                }
                osc.frequency.setValueAtTime(freq, time);
                
                // Classic filter envelope
                filter.type = 'lowpass';
                if (timeScale < 0.5) {
                    // Underwater muffled filter: frequency stays very low
                    filter.frequency.setValueAtTime(180, time);
                    filter.frequency.exponentialRampToValueAtTime(300, time + 0.04);
                    filter.frequency.exponentialRampToValueAtTime(120, time + 0.18);
                } else {
                    filter.frequency.setValueAtTime(250, time);
                    filter.frequency.exponentialRampToValueAtTime(1100, time + 0.04);
                    filter.frequency.exponentialRampToValueAtTime(80, time + 0.18);
                }
                
                // Volume envelope
                gain.gain.setValueAtTime(0.0, time);
                gain.gain.linearRampToValueAtTime(0.12, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.20);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(time);
                osc.stop(time + 0.22);
                
                this.activeNodes.push(osc);
                if (this.activeNodes.length > 25) {
                    this.activeNodes.shift();
                }
            }
        };

            jump() {

            update() {

            let y = FLOOR_Y - 80;
            gameObjects.push({
                type: type,
                x: LOGICAL_WIDTH + 50,
                y: y,
                w: size,
                h: size,
                phaseOffset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function updateAndDrawGameObjects() {
            let isDashing = isPressing && pressDuration > 8;

            for (let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                
                // Pull Chips toward player if Magnet buff is active
                if (obj.type === 'chip' && magnetTimer > 0) {
                    let dx = (player.x + player.width / 2) - (obj.x + obj.w / 2);
                    let dy = (player.y + player.height / 2) - (obj.y + obj.h / 2);
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let magnetRadius = selectedSkin === 'holo' ? 570 : 380;
                    if (dist < magnetRadius) {
                        obj.x += (dx / dist) * 14 * timeScale;
                        obj.y += (dy / dist) * 14 * timeScale;
                        obj.baseY = obj.y; // Damp normal oscillation during attraction
                    } else {
                        obj.x -= baseObstacleSpeed * timeScale;
                    }
                } else {
                    obj.x -= baseObstacleSpeed * timeScale;
                }

                // Sinusoidal bobbing hover animations
                if (obj.type === 'drone') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.08 + obj.phaseOffset) * 35;
                } else if (obj.type === 'chip') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.12 + obj.phaseOffset) * 8;
                } else if (obj.type === 'magnet' || obj.type === 'shield_pu') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.07 + obj.phaseOffset) * 10;
                }

                // DRAW GAME OBJECTS
                ctx.save();
                
                if (obj.type === 'portal') {
                    let portalColor = obj.sectorTarget === 2 ? '#ff8c00' : '#ff0055';
                    ctx.save();
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = portalColor;
                    ctx.strokeStyle = portalColor;
                    ctx.lineWidth = 6;
                    
                    ctx.beginPath();
                    ctx.moveTo(obj.x, FLOOR_Y);
                    ctx.lineTo(obj.x, 100);
                    ctx.lineTo(obj.x + obj.w, 100);
                    ctx.lineTo(obj.x + obj.w, FLOOR_Y);
                    ctx.stroke();

                    ctx.fillStyle = `rgba(${hexToRgb(portalColor)}, 0.15)`;
                    ctx.fillRect(obj.x, 100, obj.w, FLOOR_Y - 100);
                    
                    ctx.strokeStyle = `rgba(255, 255, 255, 0.4)`;
                    ctx.lineWidth = 2;
                    for (let py = 120; py < FLOOR_Y; py += 30) {
                        let shift = Math.sin(gameFrames * 0.1 + py) * 10;
                        ctx.beginPath();
                        ctx.moveTo(obj.x + shift, py);
                        ctx.lineTo(obj.x + obj.w - shift, py);
                        ctx.stroke();
                    }
                    ctx.restore();
                } else if (obj.type === 'spike') {
                    // --- NEON GROUND SPIKES ---
                    let spikeGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = spikeGlow;
                    ctx.fillStyle = '#0f0515';
                    ctx.strokeStyle = spikeGlow;
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    let numSpikes = Math.max(2, Math.floor(obj.w / 20));
                    let spikeW = obj.w / numSpikes;
                    for (let j = 0; j < numSpikes; j++) {
                        let sx = obj.x + j * spikeW;
                        ctx.lineTo(sx + spikeW / 2, obj.y);
                        ctx.lineTo(sx + spikeW, obj.y + obj.h);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                } else if (obj.type === 'shield') {
                    // --- NEON FLOATING FORCEFIELD SHIELDS ---
                    let shieldGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = shieldGlow;
                    ctx.fillStyle = '#0a0314';
                    ctx.strokeStyle = shieldGlow;
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    ctx.roundRect(obj.x, obj.y, obj.w, obj.h, 6);
                    ctx.fill();
                    ctx.stroke();

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    for (let sy = obj.y + 15; sy < obj.y + obj.h; sy += 25) {
                        ctx.beginPath();
                        ctx.moveTo(obj.x + 5, sy);
                        ctx.lineTo(obj.x + obj.w - 5, sy);
                        ctx.stroke();
                    }

                } else if (obj.type === 'drone') {
                    // --- CYBER DRONES (Diamond glow shape) ---
                    let droneGlow = currentPhase === 3 ? '#ffaa00' : '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = droneGlow;
                    ctx.fillStyle = '#06161a';
                    ctx.strokeStyle = droneGlow;
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 5 + Math.sin(gameFrames * 0.2) * 2, 0, Math.PI * 2);
                    ctx.fill();

                } else if (obj.type === 'chip') {
                    // --- NEON GOLD COLLECTIBLE ENERGY CHIPS ---
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ffaa00';
                    ctx.fillStyle = '#221500';
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2.5;

                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 3, 0, Math.PI * 2);
                    ctx.fill();

                } else if (obj.type === 'magnet') {
                    // --- MAGNET POWER-UP ITEM ---
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#d35400';
                    ctx.fillStyle = '#110500';
                    ctx.strokeStyle = '#e67e22';
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Magnet letter icon "M"
                    ctx.font = '900 16px "Orbitron", sans-serif';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 0;
                    ctx.fillText("M", obj.x + obj.w / 2, obj.y + obj.h / 2 + 5);

                } else if (obj.type === 'shield_pu') {
                    // --- SHIELD POWER-UP ITEM ---
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.fillStyle = '#001a1a';
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Shield icon glyph "S"
                    ctx.font = '900 16px "Orbitron", sans-serif';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 0;
                    ctx.fillText("S", obj.x + obj.w / 2, obj.y + obj.h / 2 + 5);
                }

                ctx.restore();

                // COLLISION AND SCORE CHECKS
                let isColliding = false;
                if (obj.type !== 'portal') {
                    isColliding = checkCollision(player, obj, obj.type === 'chip' || obj.type === 'magnet' || obj.type === 'shield_pu');
                }

                if (isColliding) {
                    if (obj.type === 'chip') {
                        // Gather Chip
                        consecutiveChips++;
                        consecutiveChipsTimer = 120; // 2 seconds combo window
                        
                        let chipVal = Math.round(20 * getComboMultiplier());
                        score += chipVal;
                        dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 15);
                        totalChips++;
                        runChipsCollected++;
                        localStorage.setItem('ninja_total_chips', totalChips);
                        Sound.playChip();
                        addComboPoints(5);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, `+${chipVal}`, 'chip');
                        spawnChipCollectParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                        
                        // Screen kick on high combos
                        if (consecutiveChips > 3) {
                            shakeTime = Math.min(8, shakeTime + 3);
                            shakeIntensity = Math.min(4, shakeIntensity + 1);
                        }
                        
                        checkMissions();
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'magnet') {
                        // Magnet Powerup Active
                        magnetTimer = 360; // 6 seconds at 60fps
                        Sound.playPowerup();
                        addComboPoints(10);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, "MAGNET", 'powerup');
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'shield_pu') {
                        // Shield Powerup Active
                        hasShield = true;
                        Sound.playPowerup();
                        addComboPoints(10);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, "SHIELD ACTIVE", 'powerup');
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'drone' && isDashing) {
                        // --- DASH ATTACK (Destroys Flying Drones) ---
                        let killVal = Math.round(50 * getComboMultiplier());
                        score += killVal;
                        dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 25);
                        runDronesDestroyed++;
                        Sound.playKill();
                        addComboPoints(20);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 15, `KILL +${killVal}`, 'kill');
                        spawnDroneExplosionParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                        
                        // Hitstop: Freeze frames on impact
                        hitstopFrames = 5;
                        
                        // Heavy screen shake on collision
                        shakeTime = 12;
                        shakeIntensity = 8;
                        
                        checkMissions();
                        gameObjects.splice(i, 1);
                        continue;

                    } else {
                        // Collision hazard
                        if (hasShield) {
                            // Shatter shield bubble, absorb hit
                            hasShield = false;
                            Sound.playShatter();
                            spawnDroneExplosionParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                            shakeTime = 12;
                            shakeIntensity = 6;
                            
                            // Splice the barrier object so it doesn't double-trigger
                            gameObjects.splice(i, 1);
                            continue;
                        } else if (selectedSkin === 'gold' && !goldReviveUsed) {
                            // Gold Overlord revive ability
                            goldReviveUsed = true;
                            hasShield = true;
                            Sound.playPowerup();
                            hitstopFrames = 40; // Freeze frame impact
                            shakeTime = 20;
                            shakeIntensity = 12;
                            spawnScorePopup(player.x + player.width / 2, player.y - 30, "GOLDEN REVIVE!", 'revive');
                            spawnDroneExplosionParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                            gameObjects.splice(i, 1);
                            continue;
                        } else {
                            // Fatal crash without shield protection or revive
                            triggerGameOver();
                        }
                    }
                }

                // Portal crossing event
                if (obj.type === 'portal' && !obj.passed && obj.x < player.x) {
                    obj.passed = true;
                    currentSector = obj.sectorTarget;
                    transitionQueued = false;
                    
                    // Flash screen
                    screenFlashColor = 'rgba(255, 255, 255, 0.8)';
                    screenFlashTimer = 15;
                    
                    // Play sound
                    Sound.playPowerup();
                    
                    // Shake screen
                    shakeTime = 20;
                    shakeIntensity = 10;
                    checkMissions();
                }

                // PRECISION NEAR-MISS CALCULATION
                if ((obj.type === 'spike' || obj.type === 'shield') && !obj.passed && !obj.nearMissTriggered) {
                    if (obj.x < player.x + player.width && obj.x + obj.w > player.x) {
                        let gap = 999;
                        if (obj.type === 'spike') {
                            gap = obj.y - (player.y + player.height);
                        } else if (obj.type === 'shield') {
                            gap = player.y - (obj.y + obj.h);
                        }

                        // Close crossing distance trigger (<42 pixels)
                        if (gap > 0 && gap < 42) {
                            obj.nearMissPossible = true;
                        }
                    }
                }

                // Supered barrier rewards styling points
                if (obj.x + obj.w < player.x) {
                    if (!obj.passed) {
                        obj.passed = true;
                        
                        if (obj.type === 'spike' || obj.type === 'shield') {
                            let passVal = Math.round(10 * getComboMultiplier());
                            score += passVal;
                            Sound.playScore();
                            
                            if (obj.nearMissPossible && !obj.nearMissTriggered) {
                                obj.nearMissTriggered = true;
                                let nearMissVal = Math.round(15 * getComboMultiplier());
                                score += nearMissVal;
                                Sound.playNearMiss();
                                addComboPoints(15);
                                spawnScorePopup(player.x + player.width / 2, player.y - 45, `NEAR MISS +${nearMissVal}`, 'near_miss');
                                
                                // Tactile screen shake and hitstop for near miss
                                shakeTime = 6;
                                shakeIntensity = 4;
                                hitstopFrames = 3;
                            }
                        }
                    }
                }

                // Purge entities scrolling out of bounds
                if (obj.x + obj.w < -100) {
                    gameObjects.splice(i, 1);
                }
            }
        }

        // --- STYLE COMBO SYSTEM (Rank D -> SSS) ---
        function addComboPoints(points) {
            comboPoints += points;
            updateComboRank();
        }

        const RANK_ORDER = ['D', 'C', 'B', 'A', 'S', 'SS', 'SSS'];

        function updateComboRank() {
            let nextRank = 'D';
            if (comboPoints < 10) {
                nextRank = 'D';
            } else if (comboPoints < 30) {
                nextRank = 'C';
            } else if (comboPoints < 60) {
                nextRank = 'B';
            } else if (comboPoints < 100) {
                nextRank = 'A';
            } else if (comboPoints < 150) {
                nextRank = 'S';
            } else if (comboPoints < 220) {
                nextRank = 'SS';
            } else {
                nextRank = 'SSS';
            }

            if (nextRank !== comboRank) {
                let currentIdx = RANK_ORDER.indexOf(comboRank);
                let nextIdx = RANK_ORDER.indexOf(nextRank);
                
                if (nextIdx > currentIdx) {
                    triggerStyleRankUp(nextRank);
                }
                comboRank = nextRank;
            }
        }

        function triggerStyleRankUp(rank) {
            styleAnnouncementTimer = 90; // 1.5s
            styleAnnouncementColor = getComboRankColorFor(rank);
            
            let actionWord = "STYLE UP!";
            if (rank === 'A') actionWord = "AWESOME!";
            else if (rank === 'S') actionWord = "SENSATIONAL!";
            else if (rank === 'SS') actionWord = "SUPER SEXY!";
            else if (rank === 'SSS') actionWord = "SMOKIN' SEXY STYLE!!";
            
            styleAnnouncementText = `${actionWord} [${rank}]`;
            screenFlashColor = `rgba(${hexToRgb(styleAnnouncementColor)}, 0.15)`;
            screenFlashTimer = 10;

            Sound.playStyleUp(rank);
            if (['A', 'S', 'SS', 'SSS'].includes(rank)) {
                hitstopFrames = 3;
                shakeTime = 8;
                shakeIntensity = 4;
            }
        }

        function getComboRankColorFor(rank) {
            switch (rank) {
                case 'D': return '#7f8c8d';
                case 'C': return '#2ecc71';
                case 'B': return '#3498db';
                case 'A': return '#9b59b6';
                case 'S': return '#f1c40f';
                case 'SS': return '#e67e22';
                case 'SSS': return '#ff0055';
                default: return '#ffffff';
            }
        }

        function getComboMultiplier() {
            switch (comboRank) {
                case 'D': return 1.0;
                case 'C': return 1.5;
                case 'B': return 2.0;
                case 'A': return 3.0;
                case 'S': return 4.0;
                case 'SS': return 5.0;
                case 'SSS': return 6.0;
                default: return 1.0;
            }
        }

        function getComboRankColor() {
            switch (comboRank) {
                case 'D': return '#7f8c8d'; // Grey
                case 'C': return '#2ecc71'; // Green
                case 'B': return '#3498db'; // Blue
                case 'A': return '#9b59b6'; // Purple
                case 'S': return '#f1c40f'; // Yellow Gold
                case 'SS': return '#e67e22'; // Orange
                case 'SSS': return '#ff0055'; // Intense Red/Pink
                default: return '#ffffff';
            }
        }

        // --- SCORE POPUPS ---
        let popups = [];

        function spawnScorePopup(x, y, text, type = 'default') {
            let color = '#00ffff';
            let glow = '#00ffff';
            let scale = 2.0;
            let angle = (Math.random() - 0.5) * 0.4;
            let angleSpeed = (Math.random() - 0.5) * 0.04;
            
            if (type === 'chip') {
                color = '#ffaa00';
                glow = '#ff5500';
                scale = 1.8 + Math.min(1.2, consecutiveChips * 0.12);
            } else if (type === 'near_miss') {
                color = '#ff6400';
                glow = '#ffaa00';
                scale = 2.2;
            } else if (type === 'kill') {
                color = '#ff0055';
                glow = '#bd00ff';
                scale = 2.4;
            } else if (type === 'achievement' || type === 'revive') {
                color = '#ffd700';
                glow = '#ffaa00';
                scale = 2.6;
            } else if (type === 'powerup') {
                color = '#00ffff';
                glow = '#bd00ff';
                scale = 2.2;
            }
            
            popups.push({
                x: x,
                y: y,
                vy: -3.5,
                vx: (Math.random() - 0.5) * 2,
                alpha: 1.0,
                text: text,
                type: type,
                color: color,
                glow: glow,
                scale: scale,
                angle: angle,
                angleSpeed: angleSpeed
            });
        }

        function updateAndDrawPopups() {
            for (let i = popups.length - 1; i >= 0; i--) {
                let p = popups[i];
                p.y += p.vy * timeScale;
                p.x += p.vx * timeScale;
                p.vy *= 0.95;
                p.alpha -= 0.03 * timeScale;
                p.scale = Math.max(1.0, p.scale - 0.06 * timeScale);
                p.angle += p.angleSpeed * timeScale;

                if (p.alpha <= 0) {
                    popups.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.scale(p.scale, p.scale);
                
                let fontSize = '20px';
                if (p.type === 'kill' || p.type === 'achievement' || p.type === 'revive') {
                    fontSize = '24px';
                }
                ctx.font = `900 ${fontSize} "Orbitron", sans-serif`;
                ctx.textAlign = 'center';
                
                ctx.shadowBlur = 12;
                ctx.shadowColor = p.glow;
                
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 4.5;
                ctx.strokeText(p.text, 0, 0);
                
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fillText(p.text, 0, 0);
                
                ctx.restore();
            }
        }

        // --- PARTICLE SYSTEM ---
        let particles = [];

        function spawnParticle(x, y, vx, vy, size, color, decay, shrink = 0) {
            particles.push({
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                size: size,
                color: color,
                alpha: 1.0,
                decay: decay,
                shrink: shrink
            });
        }

        function spawnJumpParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                let vx = (Math.random() - 0.5) * 6 - 2;
                let vy = (Math.random() - 0.3) * -4;
                let size = Math.random() * 5 + 3;
                let decay = Math.random() * 0.03 + 0.02;
                spawnParticle(x, y, vx, vy, size, secondaryColor, decay);
            }
        }

        function spawnRunParticles(x, y) {
            let vx = (Math.random() - 0.9) * 4;
            let vy = (Math.random() - 0.5) * -2;
            let size = Math.random() * 4 + 2;
            let decay = Math.random() * 0.05 + 0.03;
            spawnParticle(x, y, vx, vy, size, `rgba(${hexToRgb(primaryColor)}, 0.65)`, decay);
        }

        function spawnDashSpark(x, y) {
            let vx = -12 - Math.random() * 6;
            let vy = (Math.random() - 0.5) * 4;
            let size = Math.random() * 4 + 2;
            let decay = Math.random() * 0.06 + 0.04;
            let activeSkinObj = SHOP_SKINS.find(s => s.id === selectedSkin) || SHOP_SKINS[0];
            let pColor = selectedSkin === 'classic' ? secondaryColor : activeSkinObj.trailColor;
            spawnParticle(x, y, vx, vy, size, pColor, decay);
        }

        function spawnGoldSpark(x, y) {
            let vx = (Math.random() - 0.5) * 4 - 2;
            let vy = (Math.random() - 0.5) * 4 - 2;
            let size = Math.random() * 3 + 1.5;
            let decay = Math.random() * 0.04 + 0.02;
            spawnParticle(x, y, vx, vy, size, '#ffd700', decay);
        }

        function spawnPlatinumSpark(x, y) {
            let vx = (Math.random() - 0.5) * 4 - 2;
            let vy = (Math.random() - 0.5) * 4 - 2;
            let size = Math.random() * 3 + 1.5;
            let decay = Math.random() * 0.04 + 0.02;
            spawnParticle(x, y, vx, vy, size, '#e5e8e8', decay);
        }

        function spawnRainbowSpark(x, y) {
            let vx = (Math.random() - 0.5) * 4 - 2;
            let vy = (Math.random() - 0.5) * 4 - 2;
            let size = Math.random() * 3 + 1.5;
            let decay = Math.random() * 0.04 + 0.02;
            let hue = Math.floor(Math.random() * 360);
            spawnParticle(x, y, vx, vy, size, `hsla(${hue}, 100%, 50%, 0.9)`, decay);
        }

        function spawnChipCollectParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 4 + 2;
                let decay = Math.random() * 0.04 + 0.03;
                spawnParticle(x, y, vx, vy, size, '#ffaa00', decay);
            }
        }

        function spawnDroneExplosionParticles(x, y) {
            let droneColor = currentPhase === 3 ? '#ffaa00' : '#00ffff';
            for (let i = 0; i < 15; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 9 + 3;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 5 + 3;
                let decay = Math.random() * 0.03 + 0.02;
                spawnParticle(x, y, vx, vy, size, droneColor, decay);
            }
        }

        function spawnDeathExplosion(x, y) {
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 12 + 4;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 8 + 4;
                let decay = Math.random() * 0.02 + 0.015;
                spawnParticle(x, y, vx, vy, size, primaryColor, decay, 0.05);
            }
            for (let i = 0; i < 20; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 16 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 6 + 2;
                let decay = Math.random() * 0.025 + 0.02;
                spawnParticle(x, y, vx, vy, size, secondaryColor, decay, 0.03);
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.alpha -= p.decay * timeScale;
                p.size = Math.max(0, p.size - p.shrink * timeScale);

                if (p.alpha <= 0 || p.size <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            }
        }

        // --- DASH ENERGY CAPACITOR (Stamina Bar) ---
        function updateDashEnergy() {
            let isDashing = isPressing && pressDuration > 8;
            if (isDashing) {
                dashEnergy = Math.max(0, dashEnergy - 1.25);
                if (dashEnergy <= 0) {
                    isPressing = false;
                    pressDuration = 0;
                }
            } else {
                dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 0.65);
            }
        }

        // --- ENVIRONMENT BACKGROUND DRAW ROUTINES (Parallax & perspective Floor) ---
        function drawBackground() {
            let skyCenterColor = '#190a2c';
            let mountainColor1 = '#15062a';
            let mountainColor2 = '#20083c';
            
            if (currentSector === 3) {
                skyCenterColor = '#2a071c';
                mountainColor1 = '#230310';

            let skyGrad = ctx.createRadialGradient(
                LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2, 50,

            );

            skyGrad.addColorStop(0.6, '#090312');
            skyGrad.addColorStop(1, '#020006');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            for (let star of stars) {
                if (gameState === STATE_PLAYING && hitstopFrames === 0) {
                    star.x -= star.speed * timeScale;
                    if (star.x < 0) star.x = LOGICAL_WIDTH;
                }
                
                star.twinkle += 0.03 * timeScale;
                let alpha = 0.4 + Math.abs(Math.sin(star.twinkle)) * 0.6;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = primaryColor;
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.15)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(LOGICAL_WIDTH - 250, 180, 80, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(LOGICAL_WIDTH - 250, 180, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            drawMountains(0.12, mountainColor1, 250, 120);
            drawMountains(0.35, mountainColor2, 160, 60);
        }

        function drawMountains(speedMultiplier, color, baseHeight, amplitude) {
            let offset = (scrollX * speedMultiplier) % LOGICAL_WIDTH;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);

            for (let x = 0; x <= LOGICAL_WIDTH + 100; x += 10) {
                let worldX = x + offset;
                let y = FLOOR_Y - baseHeight - Math.sin(worldX * 0.005) * amplitude - Math.cos(worldX * 0.012) * (amplitude * 0.4);
                ctx.lineTo(x, y);
            }

            ctx.lineTo(LOGICAL_WIDTH, FLOOR_Y);
            ctx.closePath();
            ctx.fill();
        }

        function drawFloorGrid() {
            let rhythmPulse = 0.7 + Math.abs(Math.sin((gameFrames / 15) * Math.PI)) * 0.35;

            ctx.save();
            ctx.shadowBlur = 15 * rhythmPulse;
            ctx.shadowColor = primaryColor;
            ctx.strokeStyle = primaryColor;
            ctx.lineWidth = 3.5 * rhythmPulse;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);
            ctx.lineTo(LOGICAL_WIDTH, FLOOR_Y);
            ctx.stroke();
            ctx.restore();

            ctx.save();
            let gridAlpha = 0.12 * rhythmPulse;
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, ${gridAlpha})`;
            ctx.lineWidth = 1.5;

            for (let y = FLOOR_Y; y <= LOGICAL_HEIGHT; y += 22) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(LOGICAL_WIDTH, y);
                ctx.stroke();
            }

            let gridSpacing = 50;
            let currentOffset = (scrollX * 1.6) % gridSpacing;

            for (let x = -200; x < LOGICAL_WIDTH + 200; x += gridSpacing) {
                ctx.beginPath();
                ctx.moveTo(x - currentOffset, FLOOR_Y);
                ctx.lineTo(x - currentOffset - 120, LOGICAL_HEIGHT);
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- MISSION MANAGEMENT LOGIC ---
        function checkMissions() {
            let updated = false;
            
            missions.forEach(m => {
                if (completedMissions.includes(m.id)) {
                    return;
                }
                
                let completed = false;
                if (m.id === 'chips' && runChipsCollected >= m.target) {
                    completed = true;
                } else if (m.id === 'drones' && runDronesDestroyed >= m.target) {
                    completed = true;
                } else if (m.id === 'nodash' && currentSector >= 2 && !runUsedDash) {
                    completed = true;
                }

                if (completed) {
                    completedMissions.push(m.id);
                    totalChips += m.reward;
                    localStorage.setItem('ninja_total_chips', totalChips);
                    
                    spawnScorePopup(LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2, `ACHIEVEMENT: +${m.reward} CHIPS!`, 'achievement');
                    Sound.playPowerup();
                    updated = true;
                }
            });

            if (updated) {
                localStorage.setItem('ninja_completed_missions', JSON.stringify(completedMissions));
                
                if (completedMissions.length === missions.length) {
                    setTimeout(() => {
                        completedMissions = [];
                        localStorage.setItem('ninja_completed_missions', JSON.stringify([]));
                        Sound.playPowerup();
                    }, 3000);
                }
            }
        }
