<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple Tap - One-Tap Action Ninja</title>
    <!-- Load Orbitron fonts for a sci-fi neon style and Outfit for clean copy -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* Base CSS reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #100624 0%, #030107 100%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Disables double-tap zoom/scrolling gestures */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Responsive container forcing 16:9 aspect ratio */
        #game-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 */
            max-width: 177.78vh; /* 16:9 */
            max-height: 100vh;
            box-shadow: 0 0 50px rgba(186, 85, 211, 0.35);
            border: 2px solid rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- CONFIGURATION AND INITIALIZATION ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Internal logical resolution of the Canvas (independent from physical display size)
        const LOGICAL_WIDTH = 1280;
        const LOGICAL_HEIGHT = 720;
        canvas.width = LOGICAL_WIDTH;
        canvas.height = LOGICAL_HEIGHT;

        // Dynamic primary and secondary neon colors (shift in Phase 3)
        let primaryColor = '#bd00ff';
        let secondaryColor = '#00ffff';

        // --- AUDIO SYNTHESIZER ENGINE (Web Audio API) ---
        // Generates arcade sound effects in real-time without external asset dependencies
        const Sound = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    BGM.init(this.ctx);
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playJump() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(580, this.ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playDash() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(260, this.ctx.currentTime + 0.2);
                
                // Lowpass filter sweeps the frequencies to give the dash a futuristic depth
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            },
            playDeath() {
                this.init();
                if (!this.ctx) return;

                // White noise generator for the impact explosion
                let bufferSize = this.ctx.sampleRate * 0.45;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                let noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(900, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.45);
                
                let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.28, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.45);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
                noise.stop(this.ctx.currentTime + 0.45);
                
                // Sub-bass sine wave thump
                let subOsc = this.ctx.createOscillator();
                let subGain = this.ctx.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.setValueAtTime(130, this.ctx.currentTime);
                subOsc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 0.35);
                
                subGain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                subGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
                
                subOsc.connect(subGain);
                subGain.connect(this.ctx.destination);
                subOsc.start();
                subOsc.stop(this.ctx.currentTime + 0.35);
            },
            playScore() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, this.ctx.currentTime); // B5
                osc.frequency.setValueAtTime(1318.51, this.ctx.currentTime + 0.07); // E6
                
                gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.22);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.22);
            },
            playKill() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.12);
                
                gain.gain.setValueAtTime(0.14, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.12);
            },
            playChip() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1100, this.ctx.currentTime);
                osc.frequency.setValueAtTime(1650, this.ctx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.07, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playNearMiss() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(950, this.ctx.currentTime + 0.18);
                
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.18);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.18);
            },
            playPowerup() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, this.ctx.currentTime + 0.15);
                osc.frequency.exponentialRampToValueAtTime(1760, this.ctx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.3);
            },
            playShatter() {
                this.init();
                if (!this.ctx) return;
                // Highpass filtered white noise burst for shield breaking
                let bufferSize = this.ctx.sampleRate * 0.25;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                let noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(2000, this.ctx.currentTime);
                
                let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.25);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
                noise.stop(this.ctx.currentTime + 0.25);
            }
        };

        // --- PROCEDURAL BGM ENGINE ---
        // Generates a dynamic 120 BPM Synthwave bassline that morphs in slow-motion
        const BGM = {
            ctx: null,
            nextNoteTime: 0.0,
            noteIndex: 0,
            isPlaying: false,
            timerId: null,
            activeNodes: [],
            
            // Bass line sequence frequencies: E1, E1, E2, E1, G1, G1, G2, G1, A1, A1, A2, A1, C2, C2, C3, C2
            notes: [41.20, 41.20, 82.40, 41.20, 49.00, 49.00, 98.00, 49.00, 55.00, 55.00, 110.00, 55.00, 65.41, 65.41, 130.81, 65.41],
            
            init(audioCtx) {
                this.ctx = audioCtx;
            },
            
            start() {
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.nextNoteTime = this.ctx.currentTime + 0.1;
                this.noteIndex = 0;
                this.tick();
            },
            
            stop() {
                this.isPlaying = false;
                if (this.timerId) {
                    clearTimeout(this.timerId);
                    this.timerId = null;
                }
                this.activeNodes.forEach(node => {
                    try { node.stop(); } catch(e) {}
                });
                this.activeNodes = [];
            },
            
            tick() {
                if (!this.isPlaying) return;
                
                let scheduleAheadTime = 0.2; // Schedules 200ms ahead
                while (this.nextNoteTime < this.ctx.currentTime + scheduleAheadTime) {
                    this.scheduleNote(this.noteIndex, this.nextNoteTime);
                    
                    // Beat tempo expands inversely proportional to the slow-mo factor
                    let stepDuration = 0.22 * (1.0 / timeScale);
                    this.nextNoteTime += stepDuration;
                    this.noteIndex = (this.noteIndex + 1) % this.notes.length;
                }
                
                this.timerId = setTimeout(() => this.tick(), 50);
            },
            
            scheduleNote(index, time) {
                if (!this.isPlaying || !this.ctx) return;
                
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                let filter = this.ctx.createBiquadFilter();
                
                osc.type = 'sawtooth';
                let freq = this.notes[index];
                
                // Shifts bass down by 1 full octave during slow-mo for a heavy, distorted timeline effect
                if (timeScale < 0.5) {
                    freq = freq * 0.5;
                }
                osc.frequency.setValueAtTime(freq, time);
                
                // Classic filter envelope
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, time);
                filter.frequency.exponentialRampToValueAtTime(1100, time + 0.04);
                filter.frequency.exponentialRampToValueAtTime(80, time + 0.18);
                
                // Volume envelope
                gain.gain.setValueAtTime(0.0, time);
                gain.gain.linearRampToValueAtTime(0.12, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.20);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(time);
                osc.stop(time + 0.22);
                
                this.activeNodes.push(osc);
                if (this.activeNodes.length > 25) {
                    this.activeNodes.shift();
                }
            }
        };

        // --- GAME STATES ---
        const STATE_START = 'START';
        const STATE_PLAYING = 'PLAYING';
        const STATE_GAMEOVER = 'GAMEOVER';
        let gameState = STATE_START;

        // --- GAMEPLAY VARIABLES ---
        const FLOOR_Y = 580; // Y coordinate representing the solid ground
        let scrollX = 0; // Scrolling background and perspectives grid factor
        let timeScale = 1.0; // Current time dilation factor (1.0 = normal, 0.2 = slow-mo)
        let gameFrames = 0; // Total frames elapsed
        let gameTime = 0; // Time in seconds, progresses relative to timeScale
        let score = 0;
        let bestScore = localStorage.getItem('ninja_best_score') || 0;
        let dashEnergy = 100;
        const MAX_ENERGY = 100;

        // Magnet Power-Up Timer
        let magnetTimer = 0;

        // Shield Power-Up Active State
        let hasShield = false;

        // Hitstop (Freeze frame duration in frames)
        let hitstopFrames = 0;

        // Style Rank System (Combo Points)
        let comboPoints = 0;
        let comboRank = 'D';

        // Invisible Tutorial Flags
        let tutorialAlpha = 1.0;
        let tutorialDismissed = false;

        // Screen Shake Timer & Amplitude
        let shakeTime = 0;
        let shakeIntensity = 0;

        // Input Tracking States
        let isPressing = false;
        let pressDuration = 0;
        let touchActive = false; // Guard to avoid duplicate touch/mouse triggers

        // --- PLAYER (Ninja) ---
        const player = {
            x: 200,
            y: FLOOR_Y - 50,
            width: 50,
            height: 50,
            vy: 0,
            gravity: 1.1,
            jumpStrength: 19,
            isGrounded: true,
            
            // Squash and Stretch parameters for movement juice
            scaleX: 1,
            scaleY: 1,
            landSquash: 0,
            runCycle: 0,

            // Ghost Trail for fast dash visuals
            trail: [],
            maxTrailLength: 12,

            reset() {
                this.x = 200;
                this.y = FLOOR_Y - 50;
                this.vy = 0;
                this.isGrounded = true;
                this.scaleX = 1;
                this.scaleY = 1;
                this.landSquash = 0;
                this.runCycle = 0;
                this.trail = [];
            },

            jump() {
                if (this.isGrounded) {
                    this.vy = -this.jumpStrength;
                    this.isGrounded = false;
                    this.landSquash = 0;
                    Sound.playJump();
                    // Increment style points slightly on jump
                    addComboPoints(1);
                    // Spawn jump puff particles
                    spawnJumpParticles(this.x + this.width / 2, FLOOR_Y);
                }
            },

            update() {
                let isDashing = isPressing && pressDuration > 8;

                if (isDashing) {
                    // Time scale transitions down to 0.2
                    timeScale = Math.max(0.2, timeScale - 0.15);
                    // Floatiness: vertical velocity damped to slide horizontally
                    this.vy *= 0.88;
                    // Move player forward in viewport
                    this.x += (520 - this.x) * 0.15;
                } else {
                    // Normalize game time speed
                    timeScale = Math.min(1.0, timeScale + 0.15);
                    // Reset ninja back to default horizontal position
                    this.x += (200 - this.x) * 0.08;
                }

                // Apply gravity factor scaled by dash and slow-mo rate
                let currentGravity = this.gravity * (isDashing ? 0.08 : 1.0) * timeScale;
                this.vy += currentGravity;
                this.y += this.vy * timeScale;

                // Collide with the floor
                if (this.y >= FLOOR_Y - this.height) {
                    this.y = FLOOR_Y - this.height;
                    this.vy = 0;
                    if (!this.isGrounded) {
                        this.isGrounded = true;
                        this.landSquash = 1.0; // Trigger landing impact squash
                    }
                }

                // Run cycle oscillation
                if (this.isGrounded) {
                    this.runCycle += 0.35 * timeScale;
                    // Spawn ground dust particles while running
                    if (gameFrames % 6 === 0 && Math.abs(this.x - 200) < 50) {
                        spawnRunParticles(this.x, FLOOR_Y);
                    }
                }

                // Calculate Squash & Stretch parameters
                if (this.isGrounded) {
                    if (this.landSquash > 0) {
                        // Impact Squash: squeeze vertically, widen horizontally
                        this.scaleY = 1 - this.landSquash * 0.25;
                        this.scaleX = 1 + this.landSquash * 0.25;
                        this.landSquash -= 0.08 * timeScale;
                    } else {
                        // Bouncing run oscillation
                        let bob = Math.sin(this.runCycle) * 0.06;
                        this.scaleY = 1 + bob;
                        this.scaleX = 1 - bob;
                    }
                } else {
                    // Aerial Stretch proportional to vertical velocity
                    let stretch = Math.min(0.25, Math.max(-0.25, this.vy * 0.015));
                    this.scaleY = 1 - stretch;
                    this.scaleX = 1 + stretch;
                }

                // Append trail nodes when in dash mode or fast aerial velocities
                if (isDashing || !this.isGrounded) {
                    this.trail.push({ x: this.x, y: this.y, scaleX: this.scaleX, scaleY: this.scaleY });
                    if (this.trail.length > this.maxTrailLength) {
                        this.trail.shift();
                    }
                    if (isDashing && Math.random() < 0.6) {
                        spawnDashSpark(this.x, this.y + Math.random() * this.height);
                    }
                } else {
                    if (this.trail.length > 0) {
                        this.trail.shift();
                    }
                }
            },

            draw() {
                // Draw trails
                for (let i = 0; i < this.trail.length; i++) {
                    let pt = this.trail[i];
                    let alpha = (i + 1) / this.trail.length * 0.22;
                    ctx.save();
                    ctx.translate(pt.x + this.width / 2, pt.y + this.height / 2);
                    ctx.scale(pt.scaleX, pt.scaleY);
                    ctx.fillStyle = `rgba(${hexToRgb(primaryColor)}, ${alpha})`;
                    ctx.beginPath();
                    ctx.roundRect(-this.width / 2, -this.height / 2, this.width, this.height, 8);
                    ctx.fill();
                    ctx.restore();
                }

                // Draw main player body with neon glow
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.scale(this.scaleX, this.scaleY);

                // Neon glow outline
                ctx.shadowBlur = 22;
                ctx.shadowColor = primaryColor;
                ctx.fillStyle = primaryColor === '#bd00ff' ? '#f5c6ff' : '#ffccd5';
                ctx.beginPath();
                ctx.roundRect(-this.width / 2, -this.height / 2, this.width, this.height, 8);
                ctx.fill();

                // Bright inner core
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(-this.width / 2 + 8, -this.height / 2 + 8, this.width - 16, this.height - 16, 4);
                ctx.fill();

                ctx.restore();

                // Draw Shield Bubble around player if active
                if (hasShield) {
                    ctx.save();
                    ctx.strokeStyle = '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width * 0.85, 0, Math.PI * 2);
                    ctx.stroke();
                    
                    // Subtle shield center shimmer
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.08)';
                    ctx.fill();
                    ctx.restore();
                }
            }
        };

        // --- DASH SPEED WARP LINES ---
        let speedLines = [];
        for (let i = 0; i < 15; i++) {
            speedLines.push({
                x: Math.random() * LOGICAL_WIDTH,
                y: Math.random() * LOGICAL_HEIGHT,
                length: Math.random() * 80 + 40,
                speed: Math.random() * 20 + 20
            });
        }

        function drawSpeedWarpLines() {
            ctx.save();
            ctx.strokeStyle = `rgba(${hexToRgb(secondaryColor)}, 0.2)`;
            ctx.lineWidth = 2;
            for (let line of speedLines) {
                line.x -= line.speed * 2.2 * timeScale;
                if (line.x + line.length < 0) {
                    line.x = LOGICAL_WIDTH + 10;
                    line.y = Math.random() * LOGICAL_HEIGHT;
                }
                ctx.beginPath();
                ctx.moveTo(line.x, line.y);
                ctx.lineTo(line.x + line.length, line.y);
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- ENTIY POOL (Spikes, Shields, Drones, Chips, Powerups) ---
        let gameObjects = [];
        let doubleObstacleQueued = false;
        let doubleObstacleTimer = 0;

        // Difficulty curves
        let currentPhase = 1;
        let baseObstacleSpeed = 6.0;
        let minSpawnDelay = 160;
        let maxSpawnDelay = 220;

        function updateObstacleSpawning() {
            // Wait until tutorial phase finishes
            if (gameState === STATE_PLAYING && gameTime < 3.0) {
                return;
            }

            // Determine difficulty curves based on elapsed playtime
            if (gameTime < 10.0) {
                currentPhase = 1;
                baseObstacleSpeed = 6.0;
                minSpawnDelay = 160;
                maxSpawnDelay = 220;
            } else if (gameTime < 30.0) {
                currentPhase = 2;
                baseObstacleSpeed = 9.0;
                minSpawnDelay = 100;
                maxSpawnDelay = 140;
            } else {
                // Phase 3 (Overdrive difficulty - triggers crimson red/gold visual overdrive shift)
                currentPhase = 3;
                baseObstacleSpeed = 12.0;
                minSpawnDelay = 65;
                maxSpawnDelay = 85;
            }

            // Main spawn counter ticks down
            obstacleTimer -= 1 * timeScale;
            if (obstacleTimer <= 0) {
                spawnRandomElement();
                obstacleTimer = Math.floor(Math.random() * (maxSpawnDelay - minSpawnDelay)) + minSpawnDelay;
                
                // Phase 3: Chance to spawn double sequence obstacles
                if (currentPhase === 3 && Math.random() < 0.35) {
                    doubleObstacleQueued = true;
                    doubleObstacleTimer = Math.floor(Math.random() * 20) + 25; // 25-45 frames later
                }
            }

            // Handle secondary stacked spawns
            if (doubleObstacleQueued) {
                doubleObstacleTimer -= 1 * timeScale;
                if (doubleObstacleTimer <= 0) {
                    spawnRandomElement();
                    doubleObstacleQueued = false;
                }
            }
        }

        function spawnRandomElement() {
            let rand = Math.random();
            
            // Check extremely rare powerups spawn chance (5% Magnet, 5% Shield PU)
            if (Math.random() < 0.07) {
                spawnPowerup(Math.random() < 0.5 ? 'magnet' : 'shield_pu');
                return;
            }

            if (currentPhase === 1) {
                // Phase 1: Ground Spikes and floating force shields
                if (rand < 0.7) spawnObstacle('spike');
                else spawnObstacle('shield');
            } else if (currentPhase === 2) {
                // Phase 2: Introduces Flying Drones (20% chance)
                if (rand < 0.5) spawnObstacle('spike');
                else if (rand < 0.75) spawnObstacle('shield');
                else spawnDrone();
            } else {
                // Phase 3: Fast, consecutive sequences
                if (rand < 0.4) spawnObstacle('spike');
                else if (rand < 0.7) spawnObstacle('shield');
                else spawnDrone();
            }
        }

        function spawnObstacle(type) {
            let width = Math.floor(Math.random() * 30) + 45; // Width: 45 - 75
            let height = Math.floor(Math.random() * 60) + 60; // Height: 60 - 120
            let y = FLOOR_Y - height;

            if (type === 'shield') {
                // Shield forcefield floats Y, allowing Ninja to slide/dash underneath
                let gapHeight = 125;
                y = FLOOR_Y - height - gapHeight;
            }

            gameObjects.push({
                type: type,
                x: LOGICAL_WIDTH + 50,
                y: y,
                w: width,
                h: height,
                passed: false,
                nearMissPossible: false,
                nearMissTriggered: false
            });

            // Spawns guiding energy chips surrounding barriers
            if (type === 'spike') {
                spawnChip(LOGICAL_WIDTH + 50 + width / 2 - 10, y - 80);
            } else if (type === 'shield') {
                spawnChip(LOGICAL_WIDTH + 50 + width / 2 - 10, FLOOR_Y - 35);
            }
        }

        function spawnDrone() {
            let size = 36;
            let baseY = FLOOR_Y - size - (Math.random() * 110 + 60);

            gameObjects.push({
                type: 'drone',
                x: LOGICAL_WIDTH + 50,
                y: baseY,
                baseY: baseY,
                w: size,
                h: size,
                phaseOffset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function spawnChip(x, y) {
            gameObjects.push({
                type: 'chip',
                x: x,
                y: y,
                baseY: y,
                w: 20,
                h: 20,
                phaseOffset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function spawnPowerup(type) {
            let size = 30;
            let y = FLOOR_Y - 80;
            gameObjects.push({
                type: type,
                x: LOGICAL_WIDTH + 50,
                y: y,
                w: size,
                h: size,
                phaseOffset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function updateAndDrawGameObjects() {
            let isDashing = isPressing && pressDuration > 8;

            for (let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                
                // Pull Chips toward player if Magnet buff is active
                if (obj.type === 'chip' && magnetTimer > 0) {
                    let dx = (player.x + player.width / 2) - (obj.x + obj.w / 2);
                    let dy = (player.y + player.height / 2) - (obj.y + obj.h / 2);
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 380) {
                        obj.x += (dx / dist) * 14 * timeScale;
                        obj.y += (dy / dist) * 14 * timeScale;
                        obj.baseY = obj.y; // Damp normal oscillation during attraction
                    } else {
                        obj.x -= baseObstacleSpeed * timeScale;
                    }
                } else {
                    obj.x -= baseObstacleSpeed * timeScale;
                }

                // Sinusoidal bobbing hover animations
                if (obj.type === 'drone') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.08 + obj.phaseOffset) * 35;
                } else if (obj.type === 'chip') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.12 + obj.phaseOffset) * 8;
                } else if (obj.type === 'magnet' || obj.type === 'shield_pu') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.07 + obj.phaseOffset) * 10;
                }

                // DRAW GAME OBJECTS
                ctx.save();
                
                if (obj.type === 'spike') {
                    // --- NEON GROUND SPIKES ---
                    let spikeGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = spikeGlow;
                    ctx.fillStyle = '#0f0515';
                    ctx.strokeStyle = spikeGlow;
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    let numSpikes = Math.max(2, Math.floor(obj.w / 20));
                    let spikeW = obj.w / numSpikes;
                    for (let j = 0; j < numSpikes; j++) {
                        let sx = obj.x + j * spikeW;
                        ctx.lineTo(sx + spikeW / 2, obj.y);
                        ctx.lineTo(sx + spikeW, obj.y + obj.h);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                } else if (obj.type === 'shield') {
                    // --- NEON FLOATING FORCEFIELD SHIELDS ---
                    let shieldGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = shieldGlow;
                    ctx.fillStyle = '#0a0314';
                    ctx.strokeStyle = shieldGlow;
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    ctx.roundRect(obj.x, obj.y, obj.w, obj.h, 6);
                    ctx.fill();
                    ctx.stroke();

                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    for (let sy = obj.y + 15; sy < obj.y + obj.h; sy += 25) {
                        ctx.beginPath();
                        ctx.moveTo(obj.x + 5, sy);
                        ctx.lineTo(obj.x + obj.w - 5, sy);
                        ctx.stroke();
                    }

                } else if (obj.type === 'drone') {
                    // --- CYBER DRONES (Diamond glow shape) ---
                    let droneGlow = currentPhase === 3 ? '#ffaa00' : '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = droneGlow;
                    ctx.fillStyle = '#06161a';
                    ctx.strokeStyle = droneGlow;
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 5 + Math.sin(gameFrames * 0.2) * 2, 0, Math.PI * 2);
                    ctx.fill();

                } else if (obj.type === 'chip') {
                    // --- NEON GOLD COLLECTIBLE ENERGY CHIPS ---
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ffaa00';
                    ctx.fillStyle = '#221500';
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2.5;

                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 3, 0, Math.PI * 2);
                    ctx.fill();

                } else if (obj.type === 'magnet') {
                    // --- MAGNET POWER-UP ITEM ---
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#d35400';
                    ctx.fillStyle = '#110500';
                    ctx.strokeStyle = '#e67e22';
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Magnet letter icon "M"
                    ctx.font = '900 16px "Orbitron", sans-serif';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 0;
                    ctx.fillText("M", obj.x + obj.w / 2, obj.y + obj.h / 2 + 5);

                } else if (obj.type === 'shield_pu') {
                    // --- SHIELD POWER-UP ITEM ---
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#00ffff';
                    ctx.fillStyle = '#001a1a';
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.w / 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Shield icon glyph "S"
                    ctx.font = '900 16px "Orbitron", sans-serif';
                    ctx.fillStyle = '#ffffff';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 0;
                    ctx.fillText("S", obj.x + obj.w / 2, obj.y + obj.h / 2 + 5);
                }

                ctx.restore();

                // COLLISION AND SCORE CHECKS
                let isColliding = checkCollision(player, obj, obj.type === 'chip' || obj.type === 'magnet' || obj.type === 'shield_pu');

                if (isColliding) {
                    if (obj.type === 'chip') {
                        // Gather Chip
                        let chipVal = Math.round(20 * getComboMultiplier());
                        score += chipVal;
                        dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 15);
                        Sound.playChip();
                        addComboPoints(5);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, `+${chipVal}`);
                        spawnChipCollectParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'magnet') {
                        // Magnet Powerup Active
                        magnetTimer = 360; // 6 seconds at 60fps
                        Sound.playPowerup();
                        addComboPoints(10);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, "MAGNET");
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'shield_pu') {
                        // Shield Powerup Active
                        hasShield = true;
                        Sound.playPowerup();
                        addComboPoints(10);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, "SHIELD ACTIVE");
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'drone' && isDashing) {
                        // --- DASH ATTACK (Destroys Flying Drones) ---
                        let killVal = Math.round(50 * getComboMultiplier());
                        score += killVal;
                        dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 25);
                        Sound.playKill();
                        addComboPoints(20);
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 15, `KILL +${killVal}`);
                        spawnDroneExplosionParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                        
                        // Hitstop: Freeze frames on impact
                        hitstopFrames = 5;
                        
                        // Heavy screen shake on collision
                        shakeTime = 12;
                        shakeIntensity = 8;
                        
                        gameObjects.splice(i, 1);
                        continue;

                    } else {
                        // Collision hazard
                        if (hasShield) {
                            // Shatter shield bubble, absorb hit
                            hasShield = false;
                            Sound.playShatter();
                            spawnDroneExplosionParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                            shakeTime = 12;
                            shakeIntensity = 6;
                            
                            // Splice the barrier object so it doesn't double-trigger
                            gameObjects.splice(i, 1);
                            continue;
                        } else {
                            // Fatal crash without shield protection
                            triggerGameOver();
                        }
                    }
                }

                // PRECISION NEAR-MISS CALCULATION
                if ((obj.type === 'spike' || obj.type === 'shield') && !obj.passed && !obj.nearMissTriggered) {
                    if (obj.x < player.x + player.width && obj.x + obj.w > player.x) {
                        let gap = 999;
                        if (obj.type === 'spike') {
                            gap = obj.y - (player.y + player.height);
                        } else if (obj.type === 'shield') {
                            gap = player.y - (obj.y + obj.h);
                        }

                        // Close crossing distance trigger (<42 pixels)
                        if (gap > 0 && gap < 42) {
                            obj.nearMissPossible = true;
                        }
                    }
                }

                // Supered barrier rewards styling points
                if (obj.x + obj.w < player.x) {
                    if (!obj.passed) {
                        obj.passed = true;
                        
                        if (obj.type === 'spike' || obj.type === 'shield') {
                            let passVal = Math.round(10 * getComboMultiplier());
                            score += passVal;
                            Sound.playScore();
                            
                            if (obj.nearMissPossible && !obj.nearMissTriggered) {
                                obj.nearMissTriggered = true;
                                let nearMissVal = Math.round(15 * getComboMultiplier());
                                score += nearMissVal;
                                Sound.playNearMiss();
                                addComboPoints(15);
                                spawnScorePopup(player.x + player.width / 2, player.y - 45, `NEAR MISS +${nearMissVal}`);
                            }
                        }
                    }
                }

                // Purge entities scrolling out of bounds
                if (obj.x + obj.w < -100) {
                    gameObjects.splice(i, 1);
                }
            }
        }

        // --- STYLE COMBO SYSTEM (Rank D -> SSS) ---
        function addComboPoints(points) {
            comboPoints += points;
            updateComboRank();
        }

        function updateComboRank() {
            // Decay points slowly during loop
            if (comboPoints < 10) {
                comboRank = 'D';
            } else if (comboPoints < 30) {
                comboRank = 'C';
            } else if (comboPoints < 60) {
                comboRank = 'B';
            } else if (comboPoints < 100) {
                comboRank = 'A';
            } else if (comboPoints < 150) {
                comboRank = 'S';
            } else if (comboPoints < 220) {
                comboRank = 'SS';
            } else {
                comboRank = 'SSS';
            }
        }

        function getComboMultiplier() {
            switch (comboRank) {
                case 'D': return 1.0;
                case 'C': return 1.5;
                case 'B': return 2.0;
                case 'A': return 3.0;
                case 'S': return 4.0;
                case 'SS': return 5.0;
                case 'SSS': return 6.0;
                default: return 1.0;
            }
        }

        function getComboRankColor() {
            switch (comboRank) {
                case 'D': return '#7f8c8d'; // Grey
                case 'C': return '#2ecc71'; // Green
                case 'B': return '#3498db'; // Blue
                case 'A': return '#9b59b6'; // Purple
                case 'S': return '#f1c40f'; // Yellow Gold
                case 'SS': return '#e67e22'; // Orange
                case 'SSS': return '#ff0055'; // Intense Red/Pink
                default: return '#ffffff';
            }
        }

        // --- SCORE POPUPS ---
        let popups = [];

        function spawnScorePopup(x, y, text) {
            popups.push({
                x: x,
                y: y,
                vy: -2.5,
                alpha: 1.0,
                text: text
            });
        }

        function updateAndDrawPopups() {
            for (let i = popups.length - 1; i >= 0; i--) {
                let p = popups[i];
                p.y += p.vy * timeScale;
                p.alpha -= 0.04 * timeScale;

                if (p.alpha <= 0) {
                    popups.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.font = 'bold 22px "Orbitron", sans-serif';
                ctx.fillStyle = `rgba(0, 255, 255, ${p.alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00ffff';
                ctx.textAlign = 'center';
                ctx.fillText(p.text, p.x, p.y);
                ctx.restore();
            }
        }

        // --- PARTICLE SYSTEM ---
        let particles = [];

        function spawnParticle(x, y, vx, vy, size, color, decay, shrink = 0) {
            particles.push({
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                size: size,
                color: color,
                alpha: 1.0,
                decay: decay,
                shrink: shrink
            });
        }

        function spawnJumpParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                let vx = (Math.random() - 0.5) * 6 - 2;
                let vy = (Math.random() - 0.3) * -4;
                let size = Math.random() * 5 + 3;
                let decay = Math.random() * 0.03 + 0.02;
                spawnParticle(x, y, vx, vy, size, secondaryColor, decay);
            }
        }

        function spawnRunParticles(x, y) {
            let vx = (Math.random() - 0.9) * 4;
            let vy = (Math.random() - 0.5) * -2;
            let size = Math.random() * 4 + 2;
            let decay = Math.random() * 0.05 + 0.03;
            spawnParticle(x, y, vx, vy, size, `rgba(${hexToRgb(primaryColor)}, 0.65)`, decay);
        }

        function spawnDashSpark(x, y) {
            let vx = -12 - Math.random() * 6;
            let vy = (Math.random() - 0.5) * 4;
            let size = Math.random() * 4 + 2;
            let decay = Math.random() * 0.06 + 0.04;
            spawnParticle(x, y, vx, vy, size, secondaryColor, decay);
        }

        function spawnChipCollectParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 4 + 2;
                let decay = Math.random() * 0.04 + 0.03;
                spawnParticle(x, y, vx, vy, size, '#ffaa00', decay);
            }
        }

        function spawnDroneExplosionParticles(x, y) {
            let droneColor = currentPhase === 3 ? '#ffaa00' : '#00ffff';
            for (let i = 0; i < 15; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 9 + 3;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 5 + 3;
                let decay = Math.random() * 0.03 + 0.02;
                spawnParticle(x, y, vx, vy, size, droneColor, decay);
            }
        }

        function spawnDeathExplosion(x, y) {
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 12 + 4;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 8 + 4;
                let decay = Math.random() * 0.02 + 0.015;
                spawnParticle(x, y, vx, vy, size, primaryColor, decay, 0.05);
            }
            for (let i = 0; i < 20; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 16 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 6 + 2;
                let decay = Math.random() * 0.025 + 0.02;
                spawnParticle(x, y, vx, vy, size, secondaryColor, decay, 0.03);
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.alpha -= p.decay * timeScale;
                p.size = Math.max(0, p.size - p.shrink * timeScale);

                if (p.alpha <= 0 || p.size <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            }
        }

        // --- DASH ENERGY CAPACITOR (Stamina Bar) ---
        function updateDashEnergy() {
            let isDashing = isPressing && pressDuration > 8;
            if (isDashing) {
                dashEnergy = Math.max(0, dashEnergy - 1.25);
                if (dashEnergy <= 0) {
                    isPressing = false;
                    pressDuration = 0;
                }
            } else {
                dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 0.65);
            }
        }

        // --- ENVIRONMENT BACKGROUND DRAW ROUTINES (Parallax & perspective Floor) ---
        function drawBackground() {
            let skyGrad = ctx.createRadialGradient(
                LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2, 50,
                LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2, LOGICAL_WIDTH
            );
            skyGrad.addColorStop(0, currentPhase === 3 ? '#2a071c' : '#190a2c');
            skyGrad.addColorStop(0.6, '#090312');
            skyGrad.addColorStop(1, '#020006');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            for (let star of stars) {
                if (gameState === STATE_PLAYING && hitstopFrames === 0) {
                    star.x -= star.speed * timeScale;
                    if (star.x < 0) star.x = LOGICAL_WIDTH;
                }
                
                star.twinkle += 0.03 * timeScale;
                let alpha = 0.4 + Math.abs(Math.sin(star.twinkle)) * 0.6;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = primaryColor;
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.15)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(LOGICAL_WIDTH - 250, 180, 80, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(LOGICAL_WIDTH - 250, 180, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            drawMountains(0.12, currentPhase === 3 ? '#230310' : '#15062a', 250, 120);
            drawMountains(0.35, currentPhase === 3 ? '#3c0316' : '#20083c', 160, 60);
        }

        function drawMountains(speedMultiplier, color, baseHeight, amplitude) {
            let offset = (scrollX * speedMultiplier) % LOGICAL_WIDTH;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);

            for (let x = 0; x <= LOGICAL_WIDTH + 100; x += 10) {
                let worldX = x + offset;
                let y = FLOOR_Y - baseHeight - Math.sin(worldX * 0.005) * amplitude - Math.cos(worldX * 0.012) * (amplitude * 0.4);
                ctx.lineTo(x, y);
            }

            ctx.lineTo(LOGICAL_WIDTH, FLOOR_Y);
            ctx.closePath();
            ctx.fill();
        }

        function drawFloorGrid() {
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = primaryColor;
            ctx.strokeStyle = primaryColor;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);
            ctx.lineTo(LOGICAL_WIDTH, FLOOR_Y);
            ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.12)`;
            ctx.lineWidth = 1.5;

            for (let y = FLOOR_Y; y <= LOGICAL_HEIGHT; y += 22) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(LOGICAL_WIDTH, y);
                ctx.stroke();
            }

            let gridSpacing = 50;
            let currentOffset = (scrollX * 1.6) % gridSpacing;

            for (let x = -200; x < LOGICAL_WIDTH + 200; x += gridSpacing) {
                ctx.beginPath();
                ctx.moveTo(x - currentOffset, FLOOR_Y);
                ctx.lineTo(x - currentOffset - 120, LOGICAL_HEIGHT);
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- HUD HUD / OVERLAYS ---
        function drawHUD() {
            // Score Board (Top-left panel)
            ctx.save();
            ctx.fillStyle = 'rgba(16, 6, 36, 0.6)';
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.35)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(30, 25, 220, 75, 8);
            ctx.fill();
            ctx.stroke();

            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.fillStyle = secondaryColor;
            ctx.shadowBlur = 5;
            ctx.shadowColor = secondaryColor;
            ctx.fillText(`SCORE: ${score}`, 50, 58);

            ctx.font = '600 14px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowBlur = 0;
            ctx.fillText(`BEST: ${bestScore}`, 50, 82);
            ctx.restore();

            // Style Rank Combo Board (Adjacent to Score panel)
            ctx.save();
            ctx.fillStyle = 'rgba(16, 6, 36, 0.6)';
            ctx.strokeStyle = `rgba(${hexToRgb(getComboRankColor())}, 0.5)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(265, 25, 110, 75, 8);
            ctx.fill();
            ctx.stroke();

            // Style header label
            ctx.font = '900 10px "Orbitron", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.textAlign = 'center';
            ctx.fillText("STYLE", 320, 42);

            // Combo rank letter
            ctx.font = '900 32px "Orbitron", sans-serif';
            ctx.fillStyle = getComboRankColor();
            ctx.shadowBlur = 10;
            ctx.shadowColor = getComboRankColor();
            ctx.textAlign = 'center';
            ctx.fillText(comboRank, 320, 75);
            ctx.restore();

            // Dash Stamina energy bar (Top-center panel)
            ctx.save();
            let barW = 320;
            let barH = 14;
            let barX = LOGICAL_WIDTH / 2 - barW / 2;
            let barY = 35;

            ctx.fillStyle = 'rgba(16, 6, 36, 0.6)';
            ctx.strokeStyle = `rgba(${hexToRgb(secondaryColor)}, 0.2)`;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 4);
            ctx.fill();
            ctx.stroke();

            let energyRatio = dashEnergy / MAX_ENERGY;
            let fillW = barW * energyRatio;

            if (fillW > 0) {
                let grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grad.addColorStop(0, primaryColor);
                grad.addColorStop(1, secondaryColor);
                
                ctx.fillStyle = grad;
                ctx.shadowBlur = 10;
                ctx.shadowColor = energyRatio < 0.2 ? '#ff0055' : secondaryColor;
                
                if (energyRatio < 0.2 && Math.floor(gameFrames / 6) % 2 === 0) {
                    ctx.fillStyle = '#ff0055';
                }

                ctx.beginPath();
                ctx.roundRect(barX, barY, fillW, barH, 4);
                ctx.fill();
            }

            ctx.font = '900 11px "Orbitron", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 0;
            ctx.fillText("DASH ENERGY", LOGICAL_WIDTH / 2, barY - 8);
            ctx.restore();

            // Permanent "Radura d'estate plot042" label in the top-right corner
            ctx.save();
            ctx.font = '600 16px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.textAlign = 'right';
            ctx.fillText("Radura d'estate plot042", LOGICAL_WIDTH - 30, 45);
            ctx.restore();

            // Magnet Timer Indicator if active
            if (magnetTimer > 0) {
                ctx.save();
                ctx.font = '900 12px "Orbitron", sans-serif';
                ctx.fillStyle = '#e67e22';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#e67e22';
                ctx.textAlign = 'right';
                ctx.fillText(`MAGNET: ${(magnetTimer / 60).toFixed(1)}s`, LOGICAL_WIDTH - 30, 75);
                ctx.restore();
            }
        }

        // --- TITLE AND GAMEOVER HUD ---
        function drawStartScreen() {
            ctx.fillStyle = 'rgba(8, 3, 18, 0.35)';
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            ctx.save();
            ctx.textAlign = 'center';
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#bd00ff';
            ctx.font = '900 78px "Orbitron", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText("PURPLE TAP", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 120);

            ctx.font = 'bold 20px "Orbitron", sans-serif';
            ctx.fillStyle = '#bd00ff';
            ctx.fillText("ONE-TAP ACTION NINJA", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 75);
            ctx.restore();

            ctx.save();
            let btnW = 340;
            let btnH = 65;
            let btnX = LOGICAL_WIDTH / 2 - btnW / 2;
            let btnY = LOGICAL_HEIGHT / 2 + 60;

            ctx.fillStyle = 'rgba(21, 8, 45, 0.8)';
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnW, btnH, 8);
            ctx.fill();
            ctx.stroke();

            ctx.font = 'bold 20px "Orbitron", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 0;
            
            let scalePulse = 1.0 + Math.sin(Date.now() * 0.007) * 0.04;
            ctx.save();
            ctx.translate(LOGICAL_WIDTH / 2, btnY + 40);
            ctx.scale(scalePulse, scalePulse);
            ctx.fillText("TAP TO START", 0, 0);
            ctx.restore();
            ctx.restore();

            // Mobile tag "Radura d'estate plot042" drawn on title screen as well
            ctx.save();
            ctx.font = '600 16px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.textAlign = 'right';
            ctx.fillText("Radura d'estate plot042", LOGICAL_WIDTH - 30, 45);
            ctx.restore();
        }

        function drawGameOverScreen() {
            ctx.fillStyle = 'rgba(5, 1, 10, 0.78)';
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            ctx.save();
            ctx.textAlign = 'center';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff0055';
            ctx.font = '900 86px "Orbitron", sans-serif';
            ctx.fillStyle = '#ff0055';
            ctx.fillText("GAME OVER", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 100);
            ctx.restore();

            let boxW = 400;
            let boxH = 150;
            let boxX = LOGICAL_WIDTH / 2 - boxW / 2;
            let boxY = LOGICAL_HEIGHT / 2 - 40;

            ctx.save();
            ctx.fillStyle = 'rgba(16, 6, 36, 0.9)';
            ctx.strokeStyle = 'rgba(255, 0, 85, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxW, boxH, 12);
            ctx.fill();
            ctx.stroke();

            ctx.textAlign = 'center';
            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`SCORE: ${score}`, LOGICAL_WIDTH / 2, boxY + 55);

            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.fillText(`BEST: ${bestScore}`, LOGICAL_WIDTH / 2, boxY + 110);
            ctx.restore();

            ctx.save();
            ctx.textAlign = 'center';
            ctx.font = '600 20px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            let pulse = Math.abs(Math.sin(Date.now() * 0.005));
            ctx.globalAlpha = 0.4 + pulse * 0.6;
            ctx.fillText("Tap anywhere to restart", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 170);
            ctx.restore();

            // Mobile tag drawn on gameover screen
            ctx.save();
            ctx.font = '600 16px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.textAlign = 'right';
            ctx.fillText("Radura d'estate plot042", LOGICAL_WIDTH - 30, 45);
            ctx.restore();
        }

        // --- CONTROL LOOPS AND GAME RESET ---
        function triggerGameOver() {
            gameState = STATE_GAMEOVER;
            Sound.playDeath();
            BGM.stop();
            
            shakeTime = 25;
            shakeIntensity = 20;

            spawnDeathExplosion(player.x + player.width / 2, player.y + player.height / 2);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('ninja_best_score', bestScore);
            }
        }

        function restartGame() {
            score = 0;
            gameFrames = 0;
            gameTime = 0;
            timeScale = 1.0;
            dashEnergy = 100;
            magnetTimer = 0;
            hasShield = false;
            hitstopFrames = 0;
            comboPoints = 0;
            comboRank = 'D';
            gameObjects = [];
            particles = [];
            popups = [];
            obstacleTimer = 100;
            doubleObstacleQueued = false;
            
            player.reset();
            gameState = STATE_PLAYING;
            Sound.playScore();
            BGM.start();
        }

        function onPress() {
            if (gameState === STATE_START) {
                Sound.playScore();
                gameState = STATE_PLAYING;
                tutorialDismissed = true;
                obstacleTimer = 180;
                BGM.start();
            } else if (gameState === STATE_GAMEOVER) {
                restartGame();
            } else if (gameState === STATE_PLAYING) {
                isPressing = true;
                pressDuration = 0;
                player.jump();
            }
        }

        function onRelease() {
            if (gameState === STATE_PLAYING) {
                // Variable Jump Height: if released early while moving upwards, clamp upward velocity to ensure a responsive short jump
                if (!player.isGrounded && player.vy < -7.5) {
                    player.vy = -7.5;
                }
                isPressing = false;
                pressDuration = 0;
            }
        }

        // Spacebar keyboard event bindings
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
                e.preventDefault(); // Prevents browser window scrolling down
                if (e.repeat) return; // Ignores keydown repeating triggers
                onPress();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
                e.preventDefault();
                onRelease();
            }
        });

        // Touch event bindings for mobile, mousedown/up for desktop
        canvas.addEventListener('touchstart', (e) => {
            touchActive = true;
            onPress();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            onRelease();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            if (touchActive) return;
            onPress();
        });

        window.addEventListener('mouseup', (e) => {
            if (touchActive) return;
            onRelease();
        });

        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // --- MAIN CORE GAME LOOP ---
        function gameLoop() {
            ctx.save();

            // Apply Screen Shake if active
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // Phase Color Shift overrides
            if (currentPhase === 3) {
                primaryColor = '#ff0055'; // Neon Crimson
                secondaryColor = '#ffaa00'; // Neon Gold
            } else {
                primaryColor = '#bd00ff'; // Neon Purple
                secondaryColor = '#00ffff'; // Neon Cyan
            }

            // Draw sky star backdrop
            drawBackground();

            // Execute logic updates only when Hitstop freeze is inactive
            if (hitstopFrames > 0) {
                hitstopFrames--;
            } else {
                if (gameState === STATE_PLAYING) {
                    gameFrames++;
                    gameTime += (1 / 60) * timeScale;
                    scrollX += 7 * timeScale;

                    // Decays style points very slowly over time
                    if (gameFrames % 10 === 0) {
                        comboPoints = Math.max(0, comboPoints - 1);
                        updateComboRank();
                    }

                    // Base survival score points tick
                    if (gameFrames % 15 === 0) {
                        score += Math.round(1 * getComboMultiplier());
                    }

                    // Dash duration increment
                    if (isPressing) {
                        pressDuration++;
                        if (pressDuration === 9) {
                            Sound.playDash();
                        }
                    }

                    // Ticks down magnet buff duration
                    if (magnetTimer > 0) {
                        magnetTimer--;
                    }

                    // Entity logic ticks
                    player.update();
                    updateObstacleSpawning();
                    updateDashEnergy();
                }
            }

            // Draw speeds warp lines overlay when player performs a dash scatto
            let isDashing = isPressing && pressDuration > 8;
            if (gameState === STATE_PLAYING && isDashing) {
                drawSpeedWarpLines();
            }

            // Update obstacles, particles and text popups (processed independent of hitstop to allow smooth animations)
            if (hitstopFrames === 0) {
                updateAndDrawGameObjects();
                updateAndDrawParticles();
                updateAndDrawPopups();
            } else {
                // Keep drawing objects static during hitstop freeze frame
                for (let obj of gameObjects) {
                    ctx.save();
                    if (obj.type === 'spike') {
                        let spikeGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = spikeGlow;
                        ctx.fillStyle = '#0f0515';
                        ctx.strokeStyle = spikeGlow;
                        ctx.lineWidth = 3.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x, obj.y + obj.h);
                        let numSpikes = Math.max(2, Math.floor(obj.w / 20));
                        let spikeW = obj.w / numSpikes;
                        for (let j = 0; j < numSpikes; j++) {
                            let sx = obj.x + j * spikeW;
                            ctx.lineTo(sx + spikeW / 2, obj.y);
                            ctx.lineTo(sx + spikeW, obj.y + obj.h);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    } else if (obj.type === 'shield') {
                        let shieldGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = shieldGlow;
                        ctx.fillStyle = '#0a0314';
                        ctx.strokeStyle = shieldGlow;
                        ctx.lineWidth = 3.5;
                        ctx.beginPath();
                        ctx.roundRect(obj.x, obj.y, obj.w, obj.h, 6);
                        ctx.fill();
                        ctx.stroke();
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1;
                        for (let sy = obj.y + 15; sy < obj.y + obj.h; sy += 25) {
                            ctx.beginPath();
                            ctx.moveTo(obj.x + 5, sy);
                            ctx.lineTo(obj.x + obj.w - 5, sy);
                            ctx.stroke();
                        }
                    } else if (obj.type === 'drone') {
                        let droneGlow = currentPhase === 3 ? '#ffaa00' : '#00ffff';
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = droneGlow;
                        ctx.fillStyle = '#06161a';
                        ctx.strokeStyle = droneGlow;
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(obj.x + obj.w / 2, obj.y);
                        ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                        ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                        ctx.lineTo(obj.x, obj.y + obj.h / 2);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 5, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (obj.type === 'chip') {
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#ffaa00';
                        ctx.fillStyle = '#221500';
                        ctx.strokeStyle = '#ffaa00';
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x + obj.w / 2, obj.y);
                        ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                        ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                        ctx.lineTo(obj.x, obj.y + obj.h / 2);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }
                    ctx.restore();
                }
                updateAndDrawParticles();
                updateAndDrawPopups();
            }

            // Draw player and scrollable grids
            player.draw();
            drawFloorGrid();
            
            // Restore matrix transformations from shake offsets
            ctx.restore();

            // HUD draws outside screen shake
            if (gameState === STATE_PLAYING) {
                drawHUD();
                
                // Fade out invisible tutorial overlay
                if (tutorialDismissed && tutorialAlpha > 0) {
                    tutorialAlpha -= 0.04;
                }
                
                if (tutorialAlpha > 0) {
                    ctx.save();
                    ctx.fillStyle = `rgba(255, 255, 255, ${tutorialAlpha})`;
                    ctx.font = '900 36px "Orbitron", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(0, 255, 255, 0.4)';
                    ctx.fillText("TAP TO JUMP", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 35);
                    ctx.fillText("HOLD TO DASH", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 35);
                    ctx.restore();
                }
            } else if (gameState === STATE_START) {
                drawStartScreen();
            } else if (gameState === STATE_GAMEOVER) {
                drawHUD();
                drawGameOverScreen();
            }

            requestAnimationFrame(gameLoop);
        }

        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
