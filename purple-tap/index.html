        // --- CONTROL LOOPS AND GAME RESET ---
        function triggerGameOver() {
            gameState = STATE_GAMEOVER;
            Sound.playDeath();
            BGM.stop();
            
            consecutiveChips = 0;
            consecutiveChipsTimer = 0;
            
            shakeTime = 25;
            shakeIntensity = 20;

            spawnDeathExplosion(player.x + player.width / 2, player.y + player.height / 2);

            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('ninja_best_score', bestScore);
            }

            // Update HTML overlay buttons visibility
            updateHTMLButtons();

            // Prepare score submission if they scored points
            if (score > 0) {
                document.getElementById('submit-score-val').innerText = score;
                document.getElementById('score-submit-container').classList.remove('hidden');
                // Retrieve player's last nickname from localStorage
                const lastNick = localStorage.getItem('ninja_nickname') || '';
                document.getElementById('player-name-input').value = lastNick;
            } else {
                document.getElementById('score-submit-container').classList.add('hidden');
            }

            // Automatically load and display leaderboard
            showLeaderboard();
        }

        function restartGame() {
            score = 0;
            gameFrames = 0;
            gameTime = 0;
            timeScale = 1.0;
            dashEnergy = 100;
            magnetTimer = 0;
            hasShield = false;
            hitstopFrames = 0;
            comboPoints = 0;
            comboRank = 'D';
            gameObjects = [];
            particles = [];
            popups = [];
            obstacleTimer = 100;
            doubleObstacleQueued = false;
            
            currentSector = 1;
            transitionQueued = false;
            sectorAnnouncementTimer = 0;
            styleAnnouncementTimer = 0;
            
            runChipsCollected = 0;
            runDronesDestroyed = 0;
            runUsedDash = false;
            goldReviveUsed = false;
            
            consecutiveChips = 0;
            consecutiveChipsTimer = 0;
            
            player.reset();
            gameState = STATE_PLAYING;
            Sound.playScore();
            BGM.start();

            // Hide leaderboard and overlay buttons during active play
            hideLeaderboard();
            hideShop();
            updateHTMLButtons();
        }

        function onPress() {
            // Guard if overlays are active to prevent actions
            if (document.getElementById('leaderboard-overlay').classList.contains('active')) {
                return;
            }
            if (document.getElementById('shop-overlay').classList.contains('active')) {
                return;
            }
            if (gameState === STATE_START) {
                Sound.playScore();
                gameState = STATE_PLAYING;
                tutorialDismissed = true;
                obstacleTimer = 180;
                BGM.start();
                updateHTMLButtons();
            } else if (gameState === STATE_GAMEOVER) {
                restartGame();
            } else if (gameState === STATE_PLAYING) {
                isPressing = true;
                pressDuration = 0;
                player.jump();
            }
        }

        function onRelease() {
            if (gameState === STATE_PLAYING) {
                // Variable Jump Height: if released early while moving upwards, clamp upward velocity to ensure a responsive short jump
                if (!player.isGrounded && player.vy < -7.5) {
                    player.vy = -7.5;
                }
                isPressing = false;
                pressDuration = 0;
            }
        }

        // Spacebar keyboard event bindings
        window.addEventListener('keydown', (e) => {
            // Avoid triggering jump if nickname input or overlays are active
            if (document.activeElement === document.getElementById('player-name-input')) {
                return;
            }
            if (document.getElementById('leaderboard-overlay').classList.contains('active') ||
                document.getElementById('shop-overlay').classList.contains('active')) {
                return;
            }
            if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
                e.preventDefault(); // Prevents browser window scrolling down
                if (e.repeat) return; // Ignores keydown repeating triggers
                onPress();
            }
        });

        window.addEventListener('keyup', (e) => {
            // Avoid triggering jump if nickname input or overlays are active
            if (document.activeElement === document.getElementById('player-name-input')) {
                return;
            }
            if (document.getElementById('leaderboard-overlay').classList.contains('active') ||
                document.getElementById('shop-overlay').classList.contains('active')) {
                return;
            }
            if (e.code === 'Space' || e.key === ' ' || e.keyCode === 32) {
                e.preventDefault();
                onRelease();
            }
        });

        // Touch event bindings for mobile, mousedown/up for desktop
        canvas.addEventListener('touchstart', (e) => {
            touchActive = true;
            onPress();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            onRelease();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            if (touchActive) return;
            onPress();
        });

        window.addEventListener('mouseup', (e) => {
            if (touchActive) return;
            onRelease();
        });

        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // --- GLOBAL LEADERBOARD INTEGRATION (DREAMLO) ---
        const dreamloPublicCode = '6a1dfd878f40bb17b0410195';
        const dreamloPrivateCode = 'vWN1M2rcEEayTu1HkN2Vzg_TQKy52IVkOBjGmsCsWvRQ';

        // --- COSMETIC SHOP LOGIC ---
        function showShop() {
            document.getElementById('shop-overlay').classList.add('active');
            renderShop();
        }

        function hideShop() {
            document.getElementById('shop-overlay').classList.remove('active');
        }

        function renderShop() {
            document.getElementById('shop-chips-count').innerText = totalChips;
            const listDiv = document.getElementById('shop-items-list');
            listDiv.innerHTML = '';

            SHOP_SKINS.forEach(skin => {
                const card = document.createElement('div');
                card.className = 'shop-item-card';
                if (selectedSkin === skin.id) {
                    card.classList.add('selected');
                }

                const isOwned = ownedSkins.includes(skin.id);
                let btnHtml = '';

                if (selectedSkin === skin.id) {
                    btnHtml = `<button class="shop-item-btn equipped" disabled>EQUIPPED</button>`;
                } else if (isOwned) {
                    btnHtml = `<button class="shop-item-btn" onclick="equipSkin('${skin.id}')">EQUIP</button>`;
                } else {
                    const canAfford = totalChips >= skin.price;
                    btnHtml = `<button class="shop-item-btn" ${canAfford ? '' : 'disabled'} onclick="buySkin('${skin.id}', ${skin.price})">BUY 🪙 ${skin.price}</button>`;
                }

                card.innerHTML = `
                    <div class="shop-item-info">
                        <div class="shop-item-preview" style="background-color: ${skin.color}; box-shadow: 0 0 8px ${skin.color}; color: ${skin.color}; border-color: ${skin.trailColor};"></div>
                        <div class="shop-item-details">
                            <span class="shop-item-name">${skin.name}</span>
                            <span class="shop-item-desc">${skin.desc}</span>
                        </div>
                    </div>
                    ${btnHtml}
                `;
                listDiv.appendChild(card);
            });
        }

        window.buySkin = function(id, price) {
            if (totalChips >= price) {
                totalChips -= price;
                ownedSkins.push(id);
                localStorage.setItem('ninja_total_chips', totalChips);
                localStorage.setItem('ninja_owned_skins', JSON.stringify(ownedSkins));
                Sound.playPowerup();
                renderShop();
            }
        };

        window.equipSkin = function(id) {
            if (ownedSkins.includes(id)) {
                selectedSkin = id;
                localStorage.setItem('ninja_selected_skin', selectedSkin);
                Sound.playChip();
                renderShop();
            }
        };

        function updateHTMLButtons() {
            const btnStart = document.getElementById('show-leaderboard-start');
            const btnShop = document.getElementById('show-shop-start');
            if (gameState === STATE_START || gameState === STATE_GAMEOVER) {
                btnStart.classList.remove('hidden');
                btnShop.classList.remove('hidden');
            } else {
                btnStart.classList.add('hidden');
                btnShop.classList.add('hidden');
            }
        }

        function showLeaderboard() {
            const overlay = document.getElementById('leaderboard-overlay');
            overlay.classList.add('active');
            fetchScores();
        }

        function hideLeaderboard() {
            const overlay = document.getElementById('leaderboard-overlay');
            overlay.classList.remove('active');
        }

        function fetchScores() {
            const listDiv = document.getElementById('leaderboard-list');
            listDiv.innerHTML = '<div class="leaderboard-loading">Loading scores...</div>';
            
            // Load via HTTPS/CORS proxy to avoid SSL/Mixed Content issues
            const targetUrl = `http://dreamlo.com/lb/${dreamloPublicCode}/json`;
            const proxyUrl = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(targetUrl)}`;
            
            fetch(proxyUrl)
                .then(res => res.json())
                .then(data => {
                    renderLeaderboard(data);
                })
                .catch(err => {
                    listDiv.innerHTML = '<div class="leaderboard-loading" style="color:#ff0055;">Failed to load scores.</div>';
                    console.error('Error fetching scores:', err);
                });
        }

        function renderLeaderboard(data) {
            const listDiv = document.getElementById('leaderboard-list');
            listDiv.innerHTML = '';
            
            let scores = [];
            if (data && data.dreamlo && data.dreamlo.leaderboard && data.dreamlo.leaderboard.entry) {
                let entry = data.dreamlo.leaderboard.entry;
                if (Array.isArray(entry)) {
                    scores = entry;
                } else {
                    scores = [entry];
                }
            }
            
            if (scores.length === 0) {
                listDiv.innerHTML = '<div class="leaderboard-loading">No scores recorded yet. Be the first!</div>';
                return;
            }
            
            // Sort scores descending
            scores.sort((a, b) => parseInt(b.score) - parseInt(a.score));
            
            // Limit to top 10
            scores = scores.slice(0, 10);
            
            scores.forEach((entry, idx) => {
                const item = document.createElement('div');
                item.className = 'leaderboard-item';
                if (idx < 3) {
                    item.classList.add('top-rank');
                }
                
                // Highlight current player nickname
                const currentSubmitNick = localStorage.getItem('ninja_nickname');
                if (entry.name === currentSubmitNick) {
                    item.classList.add('current-player');
                }
                
                let rankEmoji = '';
                if (idx === 0) rankEmoji = '🥇 ';
                else if (idx === 1) rankEmoji = '🥈 ';
                else if (idx === 2) rankEmoji = '🥉 ';
                else rankEmoji = `#${idx + 1} `;
                
                const cleanName = entry.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                
                item.innerHTML = `
                    <span>${rankEmoji}${cleanName}</span>
                    <span>${parseInt(entry.score).toLocaleString()} pts</span>
                `;
                listDiv.appendChild(item);
            });
        }

        function submitScore() {
            const nameInput = document.getElementById('player-name-input');
            let name = nameInput.value.trim().replace(/[^a-zA-Z0-9]/g, ''); // alphanumeric only
            if (!name) {
                alert('Please enter a valid nickname!');
                return;
            }
            
            localStorage.setItem('ninja_nickname', name);
            
            const submitBtn = document.getElementById('submit-score-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = 'SUBMITTING...';
            
            // Submit via HTTPS/CORS proxy to avoid SSL/Mixed Content issues
            const targetUrl = `http://dreamlo.com/lb/${dreamloPrivateCode}/add-pipe/${name}/${score}`;
            const proxyUrl = `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(targetUrl)}`;
            
            fetch(proxyUrl)
                .then(() => {
                    submitBtn.innerText = 'SUBMIT';
                    submitBtn.disabled = false;
                    document.getElementById('score-submit-container').classList.add('hidden');
                    fetchScores();
                })
                .catch(err => {
                    alert('Submission failed, please try again.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'SUBMIT';
                    console.error('Error submitting score:', err);
                });
        }

        // Initialize HUD elements and events
        document.getElementById('show-leaderboard-start').addEventListener('click', showLeaderboard);
        document.getElementById('close-leaderboard-btn').addEventListener('click', hideLeaderboard);
        document.getElementById('submit-score-btn').addEventListener('click', submitScore);
        
        document.getElementById('show-shop-start').addEventListener('click', showShop);
        document.getElementById('close-shop-btn').addEventListener('click', hideShop);

        // Setup name submission keyboard shortcut (Enter key)
        document.getElementById('player-name-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                submitScore();
            }
        });

        // Initialize buttons visibility
        updateHTMLButtons();

        // --- MAIN CORE GAME LOOP ---
        function gameLoop() {
            // Apply canvas slow-motion CSS filter dynamically
            updateCanvasFilter();

            ctx.save();

            // Apply Screen Shake if active
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // Sector Color Shift overrides
            if (currentSector === 3) {
                primaryColor = '#ff0055'; // Neon Crimson
                secondaryColor = '#ffaa00'; // Neon Gold
            } else if (currentSector === 2) {
                primaryColor = '#ff8c00'; // Neon Orange
                secondaryColor = '#ffd700'; // Neon Yellow
            } else {
                primaryColor = '#bd00ff'; // Neon Purple
                secondaryColor = '#00ffff'; // Neon Cyan
            }

            // Draw sky star backdrop
            drawBackground();

            // Execute logic updates only when Hitstop freeze is inactive
            if (hitstopFrames > 0) {
                hitstopFrames--;
            } else {
                if (gameState === STATE_PLAYING) {
                    gameFrames++;
                    gameTime += (1 / 60) * timeScale;
                    scrollX += 7 * timeScale;

                    // Decays style points very slowly over time
                    if (gameFrames % 10 === 0) {
                        comboPoints = Math.max(0, comboPoints - 1);
                        updateComboRank();
                    }

                    // Base survival score points tick
                    if (gameFrames % 15 === 0) {
                        score += Math.round(1 * getComboMultiplier());
                    }

                    // Dash duration increment
                    if (isPressing) {
                        pressDuration++;
                        if (pressDuration === 9) {
                            Sound.playDash();
                        }
                    }

                    // Ticks down magnet buff duration
                    if (magnetTimer > 0) {
                        magnetTimer--;
                    }

                    // Decay consecutive chips timer
                    if (consecutiveChipsTimer > 0) {
                        consecutiveChipsTimer -= 1 * timeScale;
                        if (consecutiveChipsTimer <= 0) {
                            consecutiveChips = 0;
                        }
                    }

                    // Entity logic ticks
                    player.update();
                    updateObstacleSpawning();
                    updateDashEnergy();

                    // Check sector transitions
                    if (score >= 400 && score < 1000 && currentSector === 1 && !transitionQueued) {
                        triggerSectorTransition(2);
                    } else if (score >= 1000 && currentSector === 2 && !transitionQueued) {
                        triggerSectorTransition(3);
                    }
                }
            }

            // Draw speeds warp lines overlay when player performs a dash scatto
            let isDashing = isPressing && pressDuration > 8;
            if (gameState === STATE_PLAYING && isDashing) {
                drawSpeedWarpLines();
            }

            // Update obstacles, particles and text popups (processed independent of hitstop to allow smooth animations)
            if (hitstopFrames === 0) {
                updateAndDrawGameObjects();
                updateAndDrawParticles();
                updateAndDrawPopups();
            } else {
                // Keep drawing objects static during hitstop freeze frame
                for (let obj of gameObjects) {
                    ctx.save();
                    if (obj.type === 'spike') {
                        let spikeGlow = currentSector === 3 ? '#ff3300' : (currentSector === 2 ? '#ff8c00' : '#ff0055');
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = spikeGlow;
                        ctx.fillStyle = '#0f0515';
                        ctx.strokeStyle = spikeGlow;
                        ctx.lineWidth = 3.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x, obj.y + obj.h);
                        let numSpikes = Math.max(2, Math.floor(obj.w / 20));
                        let spikeW = obj.w / numSpikes;
                        for (let j = 0; j < numSpikes; j++) {
                            let sx = obj.x + j * spikeW;
                            ctx.lineTo(sx + spikeW / 2, obj.y);
                            ctx.lineTo(sx + spikeW, obj.y + obj.h);
                        }
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    } else if (obj.type === 'shield') {
                        let shieldGlow = currentSector === 3 ? '#ff3300' : (currentSector === 2 ? '#ff8c00' : '#ff0055');
                        ctx.shadowBlur = 18;
                        ctx.shadowColor = shieldGlow;
                        ctx.fillStyle = '#0a0314';
                        ctx.strokeStyle = shieldGlow;
                        ctx.lineWidth = 3.5;
                        ctx.beginPath();
                        ctx.roundRect(obj.x, obj.y, obj.w, obj.h, 6);
                        ctx.fill();
                        ctx.stroke();
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1;
                        for (let sy = obj.y + 15; sy < obj.y + obj.h; sy += 25) {
                            ctx.beginPath();
                            ctx.moveTo(obj.x + 5, sy);
                            ctx.lineTo(obj.x + obj.w - 5, sy);
                            ctx.stroke();
                        }
                    } else if (obj.type === 'drone') {
                        let droneGlow = currentSector === 3 ? '#ffaa00' : '#00ffff';
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = droneGlow;
                        ctx.fillStyle = '#06161a';
                        ctx.strokeStyle = droneGlow;
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(obj.x + obj.w / 2, obj.y);
                        ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                        ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                        ctx.lineTo(obj.x, obj.y + obj.h / 2);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                        ctx.fillStyle = '#ffffff';
                        ctx.beginPath();
                        ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 5, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (obj.type === 'chip') {
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#ffaa00';
                        ctx.fillStyle = '#221500';
                        ctx.strokeStyle = '#ffaa00';
                        ctx.lineWidth = 2.5;
                        ctx.beginPath();
                        ctx.moveTo(obj.x + obj.w / 2, obj.y);
                        ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                        ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                        ctx.lineTo(obj.x, obj.y + obj.h / 2);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    } else if (obj.type === 'portal') {
                        let portalColor = obj.sectorTarget === 2 ? '#ff8c00' : '#ff0055';
                        ctx.shadowBlur = 30;
                        ctx.shadowColor = portalColor;
                        ctx.strokeStyle = portalColor;
                        ctx.lineWidth = 6;
                        ctx.beginPath();
                        ctx.moveTo(obj.x, FLOOR_Y);
                        ctx.lineTo(obj.x, 100);
                        ctx.lineTo(obj.x + obj.w, 100);
                        ctx.lineTo(obj.x + obj.w, FLOOR_Y);
                        ctx.stroke();
                        ctx.fillStyle = `rgba(${hexToRgb(portalColor)}, 0.15)`;
                        ctx.fillRect(obj.x, 100, obj.w, FLOOR_Y - 100);
                    } else if (obj.type === 'magnet') {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#e67e22';
                        ctx.fillStyle = '#110500';
                        ctx.strokeStyle = '#e67e22';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.w / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    } else if (obj.type === 'shield_pu') {
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#00ffff';
                        ctx.fillStyle = '#001a1a';
                        ctx.strokeStyle = '#00ffff';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, obj.w / 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                    }
                    ctx.restore();
                }
                updateAndDrawParticles();
                updateAndDrawPopups();
            }

            // Draw player and scrollable grids
            player.draw();
            drawFloorGrid();
            
            // Restore matrix transformations from shake offsets
            ctx.restore();

            // HUD draws outside screen shake
            if (gameState === STATE_PLAYING) {
                drawHUD();
                drawSSSFeverBorder();
                
                // Fade out invisible tutorial overlay
                if (tutorialDismissed && tutorialAlpha > 0) {
                    tutorialAlpha -= 0.04;
                }
                
                if (tutorialAlpha > 0) {
                    ctx.save();
                    ctx.fillStyle = `rgba(255, 255, 255, ${tutorialAlpha})`;
                    ctx.font = '900 36px "Orbitron", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(0, 255, 255, 0.4)';
                    ctx.fillText("TAP TO JUMP", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 35);
                    ctx.fillText("HOLD TO DASH", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 35);
                    ctx.restore();
                }

                // Draw Sector Transition Announcements center overlay
                if (sectorAnnouncementTimer > 0) {
                    sectorAnnouncementTimer--;
                    ctx.save();
                    ctx.textAlign = 'center';
                    ctx.font = '900 48px "Orbitron", sans-serif';
                    let scaleVal = 1.0 + Math.sin(sectorAnnouncementTimer * 0.05) * 0.05;
                    ctx.translate(LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 100);
                    ctx.scale(scaleVal, scaleVal);
                    
                    let textColor = currentSector === 1 ? '#ff8c00' : '#ff0055';
                    if (sectorAnnouncementText.includes("SECTOR 3")) textColor = '#ff0055';
                    
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = textColor;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(sectorAnnouncementText, 0, 0);
                    
                    ctx.font = 'bold 20px "Orbitron", sans-serif';
                    ctx.fillStyle = textColor;
                    ctx.fillText("PREPARE FOR WARP...", 0, 40);
                    ctx.restore();
                }

                // Draw Style Announcement floating alert
                if (styleAnnouncementTimer > 0) {
                    styleAnnouncementTimer--;
                    ctx.save();
                    ctx.font = '900 28px "Orbitron", sans-serif';
                    ctx.textAlign = 'center';
                    let yOffset = (90 - styleAnnouncementTimer) * 0.4;
                    let alpha = Math.min(1.0, styleAnnouncementTimer / 15);
                    
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.strokeStyle = `rgba(${hexToRgb(styleAnnouncementColor)}, ${alpha})`;
                    ctx.lineWidth = 1.5;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = styleAnnouncementColor;
                    
                    ctx.fillText(styleAnnouncementText, LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 150 - yOffset);
                    ctx.strokeText(styleAnnouncementText, LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 150 - yOffset);
                    ctx.restore();
                }

            } else if (gameState === STATE_START) {
                drawStartScreen();
            } else if (gameState === STATE_GAMEOVER) {
                drawHUD();
                drawGameOverScreen();
            }

            // Draw Screen Flash overlay
            if (screenFlashTimer > 0) {
                screenFlashTimer--;
                ctx.save();
                ctx.fillStyle = screenFlashColor;
                ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
                ctx.restore();
            }

            requestAnimationFrame(gameLoop);
        }

        // Helper function for slow-motion CSS filter transitions
        function updateCanvasFilter() {
            if (gameState === STATE_PLAYING) {
                let isDashing = isPressing && pressDuration > 8;
                if (isDashing) {
                    let t = (1.0 - timeScale) / 0.8; // 0 to 1
                    let contrastVal = 1.0 + t * 0.25;
                    let saturateVal = 1.0 + t * 0.4;
                    let hueRotateVal = -t * 15;
                    canvas.style.filter = `contrast(${contrastVal}) saturate(${saturateVal}) hue-rotate(${hueRotateVal}deg)`;
                } else {
                    canvas.style.filter = 'none';
                }
            } else {
                canvas.style.filter = 'none';
            }
        }

        // Helper function to trigger sector transitions
        function triggerSectorTransition(targetSector) {
            transitionQueued = true;
            sectorAnnouncementTimer = 180;
            sectorAnnouncementText = targetSector === 2 ? "SECTOR 2: NEON GRID" : "SECTOR 3: OVERDRIVE CORE";
            
            setTimeout(() => {
                if (gameState === STATE_PLAYING) {
                    gameObjects.push({
                        type: 'portal',
                        x: LOGICAL_WIDTH + 100,
                        y: 0,
                        w: 80,
                        h: FLOOR_Y,
                        passed: false,
                        sectorTarget: targetSector
                    });
                }
            }, 500);
        }

        requestAnimationFrame(gameLoop);

    </script>
