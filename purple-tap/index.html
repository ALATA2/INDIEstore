<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Purple Tap - One-Tap Action Ninja</title>
    <!-- Carica i font Orbitron per un look sci-fi neon e Outfit per testi puliti -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset CSS di base */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #100624 0%, #030107 100%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none; /* Disabilita i gesti di zoom/pan del browser */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Contenitore responsive che forza il rapporto d'aspetto 16:9 */
        #game-container {
            position: relative;
            width: 100vw;
            height: 56.25vw; /* 16:9 */
            max-width: 177.78vh; /* 16:9 */
            max-height: 100vh;
            box-shadow: 0 0 50px rgba(186, 85, 211, 0.35);
            border: 2px solid rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            overflow: hidden;
            background-color: #000000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // --- CONFIGURAZIONE E INIZIALIZZAZIONE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Risoluzione logica interna del Canvas (indipendente dal display fisico)
        const LOGICAL_WIDTH = 1280;
        const LOGICAL_HEIGHT = 720;
        canvas.width = LOGICAL_WIDTH;
        canvas.height = LOGICAL_HEIGHT;

        // Colori primari e secondari dinamici (cambiano nella fase 3)
        let primaryColor = '#bd00ff';
        let secondaryColor = '#00ffff';

        // --- MOTORE DI SINTESI AUDIO (Web Audio API) ---
        // Genera effetti sonori sintetizzati in tempo reale senza asset esterni
        const Sound = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    BGM.init(this.ctx);
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playJump() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(580, this.ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playDash() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(110, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(260, this.ctx.currentTime + 0.2);
                
                // Filtro passa basso per rendere il dash più cupo e futuristico
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(600, this.ctx.currentTime);
                
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.2);
            },
            playDeath() {
                this.init();
                if (!this.ctx) return;

                // Generatore di rumore bianco per l'esplosione
                let bufferSize = this.ctx.sampleRate * 0.45;
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                let noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                let filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(900, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.45);
                
                let gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.28, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.45);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start();
                noise.stop(this.ctx.currentTime + 0.45);
                
                // Onda sinusoidale sub-bass per dare peso all'esplosione
                let subOsc = this.ctx.createOscillator();
                let subGain = this.ctx.createGain();
                subOsc.type = 'sine';
                subOsc.frequency.setValueAtTime(130, this.ctx.currentTime);
                subOsc.frequency.linearRampToValueAtTime(30, this.ctx.currentTime + 0.35);
                
                subGain.gain.setValueAtTime(0.25, this.ctx.currentTime);
                subGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
                
                subOsc.connect(subGain);
                subGain.connect(this.ctx.destination);
                subOsc.start();
                subOsc.stop(this.ctx.currentTime + 0.35);
            },
            playScore() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, this.ctx.currentTime); // B5
                osc.frequency.setValueAtTime(1318.51, this.ctx.currentTime + 0.07); // E6
                
                gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.22);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.22);
            },
            playKill() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.12);
                
                gain.gain.setValueAtTime(0.14, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.12);
            },
            playChip() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(1100, this.ctx.currentTime);
                osc.frequency.setValueAtTime(1650, this.ctx.currentTime + 0.05);
                
                gain.gain.setValueAtTime(0.07, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            },
            playNearMiss() {
                this.init();
                if (!this.ctx) return;
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(550, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(950, this.ctx.currentTime + 0.18);
                
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.18);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.18);
            }
        };

        // --- GENERATORE DI MUSICA BGM PROCEDURALE ---
        // Genera un giro di basso synthwave a 120 BPM che si adatta allo slow-motion
        const BGM = {
            ctx: null,
            nextNoteTime: 0.0,
            noteIndex: 0,
            isPlaying: false,
            timerId: null,
            activeNodes: [],
            
            // Frequenze di basso: Mi (E1, E2), Sol (G1, G2), La (A1, A2), Do (C2, C3)
            notes: [41.20, 41.20, 82.40, 41.20, 49.00, 49.00, 98.00, 49.00, 55.00, 55.00, 110.00, 55.00, 65.41, 65.41, 130.81, 65.41],
            
            init(audioCtx) {
                this.ctx = audioCtx;
            },
            
            start() {
                if (this.isPlaying) return;
                this.isPlaying = true;
                this.nextNoteTime = this.ctx.currentTime + 0.1;
                this.noteIndex = 0;
                this.tick();
            },
            
            stop() {
                this.isPlaying = false;
                if (this.timerId) {
                    clearTimeout(this.timerId);
                    this.timerId = null;
                }
                // Arresto immediato di tutte le note in riproduzione
                this.activeNodes.forEach(node => {
                    try { node.stop(); } catch(e) {}
                });
                this.activeNodes = [];
            },
            
            tick() {
                if (!this.isPlaying) return;
                
                let scheduleAheadTime = 0.2; // Quanti secondi programmare in anticipo
                while (this.nextNoteTime < this.ctx.currentTime + scheduleAheadTime) {
                    this.scheduleNote(this.noteIndex, this.nextNoteTime);
                    
                    // La durata dello step musicale si allunga se siamo in slow-motion
                    let stepDuration = 0.22 * (1.0 / timeScale);
                    this.nextNoteTime += stepDuration;
                    this.noteIndex = (this.noteIndex + 1) % this.notes.length;
                }
                
                this.timerId = setTimeout(() => this.tick(), 50);
            },
            
            scheduleNote(index, time) {
                if (!this.isPlaying || !this.ctx) return;
                
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                let filter = this.ctx.createBiquadFilter();
                
                osc.type = 'sawtooth';
                let freq = this.notes[index];
                
                // Abbassa di un'ottava la tonalità durante il dash (slow-mo) per un effetto cupo e pesante
                if (timeScale < 0.5) {
                    freq = freq * 0.5;
                }
                osc.frequency.setValueAtTime(freq, time);
                
                // Inviluppo del filtro
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(250, time);
                filter.frequency.exponentialRampToValueAtTime(1100, time + 0.04);
                filter.frequency.exponentialRampToValueAtTime(80, time + 0.18);
                
                // Inviluppo del volume
                gain.gain.setValueAtTime(0.0, time);
                gain.gain.linearRampToValueAtTime(0.12, time + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, time + 0.20);
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(time);
                osc.stop(time + 0.22);
                
                this.activeNodes.push(osc);
                if (this.activeNodes.length > 25) {
                    this.activeNodes.shift();
                }
            }
        };

        // --- STATI DI GIOCO ---
        const STATE_START = 'START';
        const STATE_PLAYING = 'PLAYING';
        const STATE_GAMEOVER = 'GAMEOVER';
        let gameState = STATE_START;

        // --- VARIABILI DI GIOCO ---
        const FLOOR_Y = 580; // Coordinata Y del terreno
        let scrollX = 0; // Utilizzato per far scorrere lo sfondo e la griglia del terreno
        let timeScale = 1.0; // Scala temporale per l'effetto di slow-motion (1.0 = normale, 0.2 = slow-mo)
        let gameFrames = 0; // Contatore globale dei frame di gioco
        let gameTime = 0; // Tempo di gioco effettivo in secondi (avanza proporzionalmente a timeScale)
        let score = 0;
        let bestScore = localStorage.getItem('ninja_best_score') || 0;
        let dashEnergy = 100;
        const MAX_ENERGY = 100;

        // Gestione Tutorial
        let tutorialAlpha = 1.0;
        let tutorialDismissed = false;

        // Gestione Screen Shake
        let shakeTime = 0;
        let shakeIntensity = 0;

        // Gestione Input
        let isPressing = false;
        let pressDuration = 0;
        let touchActive = false; // Impedisce il double-firing su dispositivi ibridi touch+mouse

        // --- ENTITÀ ---
        
        // Il Giocatore (Ninja)
        const player = {
            x: 200,
            y: FLOOR_Y - 50,
            width: 50,
            height: 50,
            vy: 0,
            gravity: 1.1,
            jumpStrength: 19,
            isGrounded: true,
            
            // Variabili per l'animazione di squash e stretch ("juice")
            scaleX: 1,
            scaleY: 1,
            landSquash: 0,
            runCycle: 0,

            // Scia del Ninja
            trail: [],
            maxTrailLength: 12,

            reset() {
                this.x = 200;
                this.y = FLOOR_Y - 50;
                this.vy = 0;
                this.isGrounded = true;
                this.scaleX = 1;
                this.scaleY = 1;
                this.landSquash = 0;
                this.runCycle = 0;
                this.trail = [];
            },

            jump() {
                if (this.isGrounded) {
                    this.vy = -this.jumpStrength;
                    this.isGrounded = false;
                    this.landSquash = 0;
                    Sound.playJump();
                    // Genera particelle di salto
                    spawnJumpParticles(this.x + this.width / 2, FLOOR_Y);
                }
            },

            update() {
                // Calcola lo stato del Dash (Slow-Motion)
                let isDashing = isPressing && pressDuration > 8; // Attivo se premuto per più di 8 frame (~130ms)

                if (isDashing) {
                    // Dilation temporale: interpolazione fluida verso 0.2
                    timeScale = Math.max(0.2, timeScale - 0.15);
                    // Diminuisce drasticamente la gravità e decelera la velocità verticale (floating effect)
                    this.vy *= 0.88;
                    // Sposta il Ninja in avanti orizzontalmente
                    this.x += (520 - this.x) * 0.15;
                } else {
                    // Ripristino tempo alla velocità normale
                    timeScale = Math.min(1.0, timeScale + 0.15);
                    // Ritorna alla posizione X di base
                    this.x += (200 - this.x) * 0.08;
                }

                // Applica gravità normale o ridotta (in base al dash e a timeScale)
                let currentGravity = this.gravity * (isDashing ? 0.08 : 1.0) * timeScale;
                this.vy += currentGravity;
                this.y += this.vy * timeScale;

                // Collisione con il terreno
                if (this.y >= FLOOR_Y - this.height) {
                    this.y = FLOOR_Y - this.height;
                    this.vy = 0;
                    if (!this.isGrounded) {
                        this.isGrounded = true;
                        this.landSquash = 1.0; // Innesca lo squash da atterraggio
                    }
                }

                // Ciclo di corsa (utilizzato per deformare il cubo mentre corre)
                if (this.isGrounded) {
                    this.runCycle += 0.35 * timeScale;
                    // Piccole particelle di polvere mentre corre
                    if (gameFrames % 6 === 0 && Math.abs(this.x - 200) < 50) {
                        spawnRunParticles(this.x, FLOOR_Y);
                    }
                }

                // Calcolo dello Squash & Stretch
                if (this.isGrounded) {
                    if (this.landSquash > 0) {
                        // Atterraggio: si schiaccia verticalmente e si allarga orizzontalmente
                        this.scaleY = 1 - this.landSquash * 0.25;
                        this.scaleX = 1 + this.landSquash * 0.25;
                        this.landSquash -= 0.08 * timeScale;
                    } else {
                        // Corsa: oscillazione sinusoidale per simulare il movimento
                        let bob = Math.sin(this.runCycle) * 0.06;
                        this.scaleY = 1 + bob;
                        this.scaleX = 1 - bob;
                    }
                } else {
                    // In aria: si allunga verticalmente in base alla velocità
                    let stretch = Math.min(0.25, Math.max(-0.25, this.vy * 0.015));
                    this.scaleY = 1 - stretch;
                    this.scaleX = 1 + stretch;
                }

                // Gestione della scia (ghost trail) durante il dash o in aria ad alta velocità
                if (isDashing || !this.isGrounded) {
                    this.trail.push({ x: this.x, y: this.y, scaleX: this.scaleX, scaleY: this.scaleY });
                    if (this.trail.length > this.maxTrailLength) {
                        this.trail.shift();
                    }
                    // Emette scintille luminose durante lo scatto
                    if (isDashing && Math.random() < 0.6) {
                        spawnDashSpark(this.x, this.y + Math.random() * this.height);
                    }
                } else {
                    if (this.trail.length > 0) {
                        this.trail.shift();
                    }
                }
            },

            draw() {
                // Disegna la scia (Ghost Trail) con il colore primario neon dinamico
                for (let i = 0; i < this.trail.length; i++) {
                    let pt = this.trail[i];
                    let alpha = (i + 1) / this.trail.length * 0.22;
                    ctx.save();
                    ctx.translate(pt.x + this.width / 2, pt.y + this.height / 2);
                    ctx.scale(pt.scaleX, pt.scaleY);
                    ctx.fillStyle = `rgba(${hexToRgb(primaryColor)}, ${alpha})`;
                    ctx.beginPath();
                    ctx.roundRect(-this.width / 2, -this.height / 2, this.width, this.height, 8);
                    ctx.fill();
                    ctx.restore();
                }

                // Disegna il corpo principale del Ninja con bagliore neon
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                ctx.scale(this.scaleX, this.scaleY);

                // Ombra/Bagliore neon del colore principale
                ctx.shadowBlur = 22;
                ctx.shadowColor = primaryColor;
                ctx.fillStyle = primaryColor === '#bd00ff' ? '#f5c6ff' : '#ffccd5'; // Tonalità di fucsia o rosso chiaro
                ctx.beginPath();
                ctx.roundRect(-this.width / 2, -this.height / 2, this.width, this.height, 8);
                ctx.fill();

                // Nucleo luminoso interno
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.roundRect(-this.width / 2 + 8, -this.height / 2 + 8, this.width - 16, this.height - 16, 4);
                ctx.fill();

                ctx.restore();
            }
        };

        // Helper per convertire HEX in RGB
        function hexToRgb(hex) {
            let bigint = parseInt(hex.replace('#', ''), 16);
            let r = (bigint >> 16) & 255;
            let g = (bigint >> 8) & 255;
            let b = bigint & 255;
            return `${r}, ${g}, ${b}`;
        }

        // --- ELEMENTI DI GIOCO (Spine, Scudi, Droni e Chip) ---
        let gameObjects = [];
        let obstacleTimer = 0;
        let doubleObstacleQueued = false;
        let doubleObstacleTimer = 0;

        // Fase di spawn corrente
        let currentPhase = 1;
        let baseObstacleSpeed = 6.0;
        let minSpawnDelay = 160;
        let maxSpawnDelay = 220;

        function updateObstacleSpawning() {
            // Nei primissimi secondi di tutorial non spawnano ostacoli
            if (gameState === STATE_PLAYING && gameTime < 3.0) {
                return;
            }

            // Calcola la fase in base ai secondi trascorsi
            if (gameTime < 10.0) {
                currentPhase = 1;
                baseObstacleSpeed = 6.0;
                minSpawnDelay = 160;
                maxSpawnDelay = 220;
            } else if (gameTime < 30.0) {
                currentPhase = 2;
                baseObstacleSpeed = 9.0;
                minSpawnDelay = 100;
                maxSpawnDelay = 140;
            } else {
                // Fase 3 (Cap massimo di difficoltà reached e Color Shift in rosso/oro)
                currentPhase = 3;
                baseObstacleSpeed = 12.0;
                minSpawnDelay = 65;
                maxSpawnDelay = 85;
            }

            // Timer di spawn regolare
            obstacleTimer -= 1 * timeScale;
            if (obstacleTimer <= 0) {
                spawnRandomElement();
                // Reimposta il timer dinamicamente in base alla fase corrente
                obstacleTimer = Math.floor(Math.random() * (maxSpawnDelay - minSpawnDelay)) + minSpawnDelay;
                
                // Fase 3: Possibilità di accodare un ostacolo doppio
                if (currentPhase === 3 && Math.random() < 0.35) {
                    doubleObstacleQueued = true;
                    doubleObstacleTimer = Math.floor(Math.random() * 20) + 25; // 25-45 frame dopo
                }
            }

            // Gestione dell'ostacolo doppio accodato
            if (doubleObstacleQueued) {
                doubleObstacleTimer -= 1 * timeScale;
                if (doubleObstacleTimer <= 0) {
                    spawnRandomElement();
                    doubleObstacleQueued = false;
                }
            }
        }

        function spawnRandomElement() {
            let rand = Math.random();
            
            if (currentPhase === 1) {
                // Fase 1: Solo ostacoli a terra e volanti, sempre guidati da Chip
                if (rand < 0.7) spawnObstacle('spike');
                else spawnObstacle('shield');
            } else if (currentPhase === 2) {
                // Fase 2: Introduzione Droni (20% di chance)
                if (rand < 0.5) spawnObstacle('spike');
                else if (rand < 0.75) spawnObstacle('shield');
                else spawnDrone();
            } else {
                // Fase 3: Difficoltà massima, più Droni e combinazioni veloci
                if (rand < 0.4) spawnObstacle('spike');
                else if (rand < 0.7) spawnObstacle('shield');
                else spawnDrone();
            }
        }

        function spawnObstacle(type) {
            let width = Math.floor(Math.random() * 30) + 45; // Larghezza: 45 - 75
            let height = Math.floor(Math.random() * 60) + 60; // Altezza: 60 - 120
            let y = FLOOR_Y - height;

            if (type === 'shield') {
                // Lo scudo fluttuante lascia spazio sotto per scivolare (125px)
                let gapHeight = 125;
                y = FLOOR_Y - height - gapHeight;
            }

            gameObjects.push({
                type: type,
                x: LOGICAL_WIDTH + 50,
                y: y,
                w: width,
                h: height,
                passed: false,
                nearMissPossible: false,
                nearMissTriggered: false
            });

            // SPONA UN CHIP GUIDA SOPRA/SOTTO L'OSTACOLO (Design intelligente)
            if (type === 'spike') {
                // Chip fluttuante sopra le spine per incoraggiare il salto mirato
                spawnChip(LOGICAL_WIDTH + 50 + width / 2 - 10, y - 80);
            } else if (type === 'shield') {
                // Chip a terra sotto lo scudo per ricompensare la scivolata audace
                spawnChip(LOGICAL_WIDTH + 50 + width / 2 - 10, FLOOR_Y - 35);
            }
        }

        function spawnDrone() {
            let size = 36;
            // Altezza variabile fluttuante a mezz'aria
            let baseY = FLOOR_Y - size - (Math.random() * 110 + 60);

            gameObjects.push({
                type: 'drone',
                x: LOGICAL_WIDTH + 50,
                y: baseY,
                baseY: baseY,
                w: size,
                h: size,
                phaseOffset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function spawnChip(x, y) {
            gameObjects.push({
                type: 'chip',
                x: x,
                y: y,
                baseY: y,
                w: 20,
                h: 20,
                phaseOffset: Math.random() * Math.PI * 2,
                passed: false
            });
        }

        function updateAndDrawGameObjects() {
            let isDashing = isPressing && pressDuration > 8;

            for (let i = gameObjects.length - 1; i >= 0; i--) {
                let obj = gameObjects[i];
                
                // Spostamento orizzontale generale basato sulla velocità e scala temporale
                obj.x -= baseObstacleSpeed * timeScale;

                // Animazione di fluttuazione sinusoidale per Droni e Chip
                if (obj.type === 'drone') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.08 + obj.phaseOffset) * 35;
                } else if (obj.type === 'chip') {
                    obj.y = obj.baseY + Math.sin(gameFrames * 0.12 + obj.phaseOffset) * 8;
                }

                // 1. DISEGNO DEI DIVERSI ELEMENTI
                ctx.save();
                
                if (obj.type === 'spike') {
                    // --- SPINE NEON TERRESTRI ---
                    let spikeGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = spikeGlow;
                    ctx.fillStyle = '#0f0515';
                    ctx.strokeStyle = spikeGlow;
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    ctx.moveTo(obj.x, obj.y + obj.h);
                    let numSpikes = Math.max(2, Math.floor(obj.w / 20));
                    let spikeW = obj.w / numSpikes;
                    for (let j = 0; j < numSpikes; j++) {
                        let sx = obj.x + j * spikeW;
                        ctx.lineTo(sx + spikeW / 2, obj.y);
                        ctx.lineTo(sx + spikeW, obj.y + obj.h);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                } else if (obj.type === 'shield') {
                    // --- SCUDO CYBERNETICO FLUTTUANTE ---
                    let shieldGlow = currentPhase === 3 ? '#ff3300' : '#ff0055';
                    ctx.shadowBlur = 18;
                    ctx.shadowColor = shieldGlow;
                    ctx.fillStyle = '#0a0314';
                    ctx.strokeStyle = shieldGlow;
                    ctx.lineWidth = 3.5;

                    ctx.beginPath();
                    ctx.roundRect(obj.x, obj.y, obj.w, obj.h, 6);
                    ctx.fill();
                    ctx.stroke();

                    // Linee di pericolo orizzontali interne allo scudo
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 1;
                    for (let sy = obj.y + 15; sy < obj.y + obj.h; sy += 25) {
                        ctx.beginPath();
                        ctx.moveTo(obj.x + 5, sy);
                        ctx.lineTo(obj.x + obj.w - 5, sy);
                        ctx.stroke();
                    }

                } else if (obj.type === 'drone') {
                    // --- DRONE VOLANTE (Cyan/Orange) ---
                    let droneGlow = currentPhase === 3 ? '#ffaa00' : '#00ffff';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = droneGlow;
                    ctx.fillStyle = '#06161a';
                    ctx.strokeStyle = droneGlow;
                    ctx.lineWidth = 3;

                    // Forma di rombo diamante
                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Nucleo bianco rotante
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 5 + Math.sin(gameFrames * 0.2) * 2, 0, Math.PI * 2);
                    ctx.fill();

                } else if (obj.type === 'chip') {
                    // --- CHIP DI ENERGIA COLLEZIONABILE ---
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = '#ffaa00';
                    ctx.fillStyle = '#221500';
                    ctx.strokeStyle = '#ffaa00';
                    ctx.lineWidth = 2.5;

                    ctx.beginPath();
                    ctx.moveTo(obj.x + obj.w / 2, obj.y);
                    ctx.lineTo(obj.x + obj.w, obj.y + obj.h / 2);
                    ctx.lineTo(obj.x + obj.w / 2, obj.y + obj.h);
                    ctx.lineTo(obj.x, obj.y + obj.h / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 0;
                    ctx.beginPath();
                    ctx.arc(obj.x + obj.w / 2, obj.y + obj.h / 2, 3, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();

                // 2. LOGICA DI COLLISIONE ED EVENTI SPECIALI
                
                // Collisione generica
                let isColliding = checkCollision(player, obj, obj.type === 'chip');

                if (isColliding) {
                    if (obj.type === 'chip') {
                        // Raccolta Microchip
                        score += 20;
                        dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 15);
                        Sound.playChip();
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 10, "+20");
                        spawnChipCollectParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                        gameObjects.splice(i, 1);
                        continue;

                    } else if (obj.type === 'drone' && isDashing) {
                        // --- DASH ATTACK: Distruzione del Drone nemico ---
                        score += 50;
                        dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 25);
                        Sound.playKill();
                        spawnScorePopup(obj.x + obj.w / 2, obj.y - 15, "KILL +50");
                        spawnDroneExplosionParticles(obj.x + obj.w / 2, obj.y + obj.h / 2);
                        
                        // Screen shake ad impatto
                        shakeTime = 12;
                        shakeIntensity = 8;
                        
                        gameObjects.splice(i, 1);
                        continue;

                    } else {
                        // Impatto letale (Spine, Scudi, o Drone senza Dash)
                        triggerGameOver();
                    }
                }

                // 3. LOGICA DI NEAR-MISS (Sfioramento ravvicinato premiato)
                if ((obj.type === 'spike' || obj.type === 'shield') && !obj.passed && !obj.nearMissTriggered) {
                    // Verifica se il ninja sta attraversando l'ostacolo sull'asse X
                    if (obj.x < player.x + player.width && obj.x + obj.w > player.x) {
                        let gap = 999;
                        if (obj.type === 'spike') {
                            // Distanza tra piedi del Ninja e punta dello spike
                            gap = obj.y - (player.y + player.height);
                        } else if (obj.type === 'shield') {
                            // Distanza tra testa del Ninja e fondo dello scudo
                            gap = player.y - (obj.y + obj.h);
                        }

                        // Se passa a meno di 42 pixel (gap molto stretto)
                        if (gap > 0 && gap < 42) {
                            obj.nearMissPossible = true;
                        }
                    }
                }

                // Quando l'ostacolo è superato, assegna i punti Near-Miss se applicabile
                if (obj.x + obj.w < player.x) {
                    if (!obj.passed) {
                        obj.passed = true;
                        
                        if (obj.type === 'spike' || obj.type === 'shield') {
                            score += 10;
                            Sound.playScore();
                            
                            // Se ha superato l'ostacolo sfiorandolo all'ultimo secondo
                            if (obj.nearMissPossible && !obj.nearMissTriggered) {
                                obj.nearMissTriggered = true;
                                score += 15;
                                Sound.playNearMiss();
                                spawnScorePopup(player.x + player.width / 2, player.y - 45, "NEAR MISS +15");
                            }
                        }
                    }
                }

                // Rimozione degli oggetti fuori dallo schermo
                if (obj.x + obj.w < -100) {
                    gameObjects.splice(i, 1);
                }
            }
        }

        // --- POPUP DI GRATIFICAZIONE (+10) ---
        let popups = [];

        function spawnScorePopup(x, y, text) {
            popups.push({
                x: x,
                y: y,
                vy: -2.5,
                alpha: 1.0,
                text: text
            });
        }

        function updateAndDrawPopups() {
            for (let i = popups.length - 1; i >= 0; i--) {
                let p = popups[i];
                p.y += p.vy * timeScale;
                p.alpha -= 0.04 * timeScale;

                if (p.alpha <= 0) {
                    popups.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.font = 'bold 22px "Orbitron", sans-serif';
                ctx.fillStyle = `rgba(0, 255, 255, ${p.alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00ffff';
                ctx.textAlign = 'center';
                ctx.fillText(p.text, p.x, p.y);
                ctx.restore();
            }
        }

        // --- SISTEMA DI PARTICELLE (Juice & Polish) ---
        let particles = [];

        function spawnParticle(x, y, vx, vy, size, color, decay, shrink = 0) {
            particles.push({
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                size: size,
                color: color,
                alpha: 1.0,
                decay: decay,
                shrink: shrink
            });
        }

        function spawnJumpParticles(x, y) {
            for (let i = 0; i < 10; i++) {
                let vx = (Math.random() - 0.5) * 6 - 2;
                let vy = (Math.random() - 0.3) * -4;
                let size = Math.random() * 5 + 3;
                let decay = Math.random() * 0.03 + 0.02;
                spawnParticle(x, y, vx, vy, size, secondaryColor, decay);
            }
        }

        function spawnRunParticles(x, y) {
            let vx = (Math.random() - 0.9) * 4;
            let vy = (Math.random() - 0.5) * -2;
            let size = Math.random() * 4 + 2;
            let decay = Math.random() * 0.05 + 0.03;
            spawnParticle(x, y, vx, vy, size, `rgba(${hexToRgb(primaryColor)}, 0.65)`, decay);
        }

        function spawnDashSpark(x, y) {
            let vx = -12 - Math.random() * 6; // Scintille spinte molto all'indietro
            let vy = (Math.random() - 0.5) * 4;
            let size = Math.random() * 4 + 2;
            let decay = Math.random() * 0.06 + 0.04;
            spawnParticle(x, y, vx, vy, size, secondaryColor, decay);
        }

        function spawnChipCollectParticles(x, y) {
            // Esplosione dorata per i chip
            for (let i = 0; i < 8; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 4 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 4 + 2;
                let decay = Math.random() * 0.04 + 0.03;
                spawnParticle(x, y, vx, vy, size, '#ffaa00', decay);
            }
        }

        function spawnDroneExplosionParticles(x, y) {
            // Forte burst ciano/arancione per la distruzione del drone
            let droneColor = currentPhase === 3 ? '#ffaa00' : '#00ffff';
            for (let i = 0; i < 15; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 9 + 3;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 5 + 3;
                let decay = Math.random() * 0.03 + 0.02;
                spawnParticle(x, y, vx, vy, size, droneColor, decay);
            }
        }

        function spawnDeathExplosion(x, y) {
            // Esplosione del colore primario neon corrente
            for (let i = 0; i < 40; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 12 + 4;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 8 + 4;
                let decay = Math.random() * 0.02 + 0.015;
                spawnParticle(x, y, vx, vy, size, primaryColor, decay, 0.05);
            }
            // Scintille del colore secondario neon
            for (let i = 0; i < 20; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 16 + 2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                let size = Math.random() * 6 + 2;
                let decay = Math.random() * 0.025 + 0.02;
                spawnParticle(x, y, vx, vy, size, secondaryColor, decay, 0.03);
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.alpha -= p.decay * timeScale;
                p.size = Math.max(0, p.size - p.shrink * timeScale);

                if (p.alpha <= 0 || p.size <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                ctx.restore();
            }
        }

        // --- DASH ENERGY CAPACITOR (Stamina Bar) ---
        function updateDashEnergy() {
            let isDashing = isPressing && pressDuration > 8;
            if (isDashing) {
                dashEnergy = Math.max(0, dashEnergy - 1.25);
                if (dashEnergy <= 0) {
                    // Scarico: ferma il dash forzatamente
                    isPressing = false;
                    pressDuration = 0;
                }
            } else {
                // Ricarica quando non si è in modalità dash
                dashEnergy = Math.min(MAX_ENERGY, dashEnergy + 0.65);
            }
        }

        // --- COLLISION DETECTOR (AABB con Hitbox tollerante) ---
        function checkCollision(r1, r2, isChip = false) {
            if (isChip) {
                // Per il chip collisione generosa senza tolleranze per facilitare la raccolta
                return (
                    r1.x < r2.x + r2.w &&
                    r1.x + r1.width > r2.x &&
                    r1.y < r2.y + r2.h &&
                    r1.y + r1.height > r2.y
                );
            }

            // Riduciamo la hitbox del Ninja del 15% per rendere le collisioni più eque ed evitare frustrazioni
            let padX = r1.width * 0.15;
            let padY = r1.height * 0.15;

            return (
                r1.x + padX < r2.x + r2.w &&
                r1.x + r1.width - padX > r2.x &&
                r1.y + padY < r2.y + r2.h &&
                r1.y + r1.height - padY > r2.y
            );
        }

        // --- AMBIENTE E STRUTTURE DI SFONDO (Parallax & Grid) ---
        
        // Generazione delle stelle nello sfondo
        let stars = [];
        for (let i = 0; i < 55; i++) {
            stars.push({
                x: Math.random() * LOGICAL_WIDTH,
                y: Math.random() * 320,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 0.4 + 0.1,
                twinkle: Math.random() * Math.PI
            });
        }

        function drawBackground() {
            // Gradient del cielo notturno
            let skyGrad = ctx.createRadialGradient(
                LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2, 50,
                LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2, LOGICAL_WIDTH
            );
            skyGrad.addColorStop(0, currentPhase === 3 ? '#2a071c' : '#190a2c'); // Sfumatura più fiammeggiante in Phase 3
            skyGrad.addColorStop(0.6, '#090312');
            skyGrad.addColorStop(1, '#020006');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            // Disegna e fa muovere le stelle con leggero bagliore del colore secondario
            for (let star of stars) {
                if (gameState === STATE_PLAYING) {
                    star.x -= star.speed * timeScale;
                    if (star.x < 0) star.x = LOGICAL_WIDTH;
                }
                
                star.twinkle += 0.03 * timeScale;
                let alpha = 0.4 + Math.abs(Math.sin(star.twinkle)) * 0.6;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            // Sole neon futuristico a cerchi concentrici (colore dinamico)
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = primaryColor;
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.15)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(LOGICAL_WIDTH - 250, 180, 80, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(LOGICAL_WIDTH - 250, 180, 50, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Montagne in parallasse
            drawMountains(0.12, currentPhase === 3 ? '#230310' : '#15062a', 250, 120); // Montagne lontane
            drawMountains(0.35, currentPhase === 3 ? '#3c0316' : '#20083c', 160, 60);  // Montagne medie
        }

        function drawMountains(speedMultiplier, color, baseHeight, amplitude) {
            let offset = (scrollX * speedMultiplier) % LOGICAL_WIDTH;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);

            for (let x = 0; x <= LOGICAL_WIDTH + 100; x += 10) {
                let worldX = x + offset;
                // Equazione sinusoidale per generare vette montuose stilizzate
                let y = FLOOR_Y - baseHeight - Math.sin(worldX * 0.005) * amplitude - Math.cos(worldX * 0.012) * (amplitude * 0.4);
                ctx.lineTo(x, y);
            }

            ctx.lineTo(LOGICAL_WIDTH, FLOOR_Y);
            ctx.closePath();
            ctx.fill();
        }

        function drawFloorGrid() {
            // Linea del terreno luminosa (neon con colore dinamico)
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = primaryColor;
            ctx.strokeStyle = primaryColor;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);
            ctx.lineTo(LOGICAL_WIDTH, FLOOR_Y);
            ctx.stroke();
            ctx.restore();

            // Griglia prospettica sotto il terreno (effetto Synthwave)
            ctx.save();
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.12)`;
            ctx.lineWidth = 1.5;

            // Linee orizzontali ad altezza variabile per dare profondità di prospettiva
            for (let y = FLOOR_Y; y <= LOGICAL_HEIGHT; y += 22) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(LOGICAL_WIDTH, y);
                ctx.stroke();
            }

            // Linee diagonali prospettiche che scorrono
            let gridSpacing = 50;
            let currentOffset = (scrollX * 1.6) % gridSpacing;

            for (let x = -200; x < LOGICAL_WIDTH + 200; x += gridSpacing) {
                ctx.beginPath();
                // Punti di partenza e di arrivo slittati lateralmente per simulare la prospettiva
                ctx.moveTo(x - currentOffset, FLOOR_Y);
                ctx.lineTo(x - currentOffset - 120, LOGICAL_HEIGHT);
                ctx.stroke();
            }
            ctx.restore();
        }

        // --- HUD / INTERFACCIA ---
        function drawHUD() {
            // Contenitore Score (in alto a sinistra)
            ctx.save();
            ctx.fillStyle = 'rgba(16, 6, 36, 0.6)';
            ctx.strokeStyle = `rgba(${hexToRgb(primaryColor)}, 0.35)`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(30, 25, 220, 75, 8);
            ctx.fill();
            ctx.stroke();

            // Testo Punteggio Corrente
            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.fillStyle = secondaryColor;
            ctx.shadowBlur = 5;
            ctx.shadowColor = secondaryColor;
            ctx.fillText(`SCORE: ${score}`, 50, 58);

            // Testo Record
            ctx.font = '600 14px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.shadowBlur = 0;
            ctx.fillText(`BEST: ${bestScore}`, 50, 82);
            ctx.restore();

            // Indicatore Barra di Energia Dash (in alto al centro)
            ctx.save();
            let barW = 320;
            let barH = 14;
            let barX = LOGICAL_WIDTH / 2 - barW / 2;
            let barY = 35;

            // Sfondo barra
            ctx.fillStyle = 'rgba(16, 6, 36, 0.6)';
            ctx.strokeStyle = `rgba(${hexToRgb(secondaryColor)}, 0.2)`;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 4);
            ctx.fill();
            ctx.stroke();

            // Riempimento energia dinamico con sfumatura neon
            let energyRatio = dashEnergy / MAX_ENERGY;
            let fillW = barW * energyRatio;

            if (fillW > 0) {
                let grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grad.addColorStop(0, primaryColor);
                grad.addColorStop(1, secondaryColor);
                
                ctx.fillStyle = grad;
                ctx.shadowBlur = 10;
                ctx.shadowColor = energyRatio < 0.2 ? '#ff0055' : secondaryColor;
                
                // Se l'energia è critica, la barra lampeggia in rosso
                if (energyRatio < 0.2 && Math.floor(gameFrames / 6) % 2 === 0) {
                    ctx.fillStyle = '#ff0055';
                }

                ctx.beginPath();
                ctx.roundRect(barX, barY, fillW, barH, 4);
                ctx.fill();
            }

            // Etichetta "ENERGY"
            ctx.font = '900 11px "Orbitron", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 0;
            ctx.fillText("DASH ENERGY", LOGICAL_WIDTH / 2, barY - 8);
            ctx.restore();
        }

        // --- SCHERMATA START & GAMEOVER ---
        function drawStartScreen() {
            // Sfondo oscurato semitrasparente
            ctx.fillStyle = 'rgba(8, 3, 18, 0.35)';
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            // Titolo del Gioco
            ctx.save();
            ctx.textAlign = 'center';
            ctx.shadowBlur = 25;

            ctx.fillText("PURPLE TAP", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 120);

            ctx.font = 'bold 20px "Orbitron", sans-serif';

            ctx.fillText("ONE-TAP ACTION NINJA", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 75);
            ctx.restore();

            // Pulsante d'inizio stilizzato
            ctx.save();
            let btnW = 340;
            let btnH = 65;
            let btnX = LOGICAL_WIDTH / 2 - btnW / 2;

            ctx.fillStyle = 'rgba(21, 8, 45, 0.8)';
            ctx.strokeStyle = '#00ffff';

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnW, btnH, 8);

            // Testo pulsante
            ctx.font = 'bold 20px "Orbitron", sans-serif';

            // Effetto pulsazione del testo
            let scalePulse = 1.0 + Math.sin(Date.now() * 0.007) * 0.04;
            ctx.save();
            ctx.translate(LOGICAL_WIDTH / 2, btnY + 40);
            ctx.scale(scalePulse, scalePulse);
            ctx.fillText("TOCCA PER INIZIARE", 0, 0);

            ctx.restore();
        }

        function drawGameOverScreen() {
            // Overlay nero semitrasparente graduale
            ctx.fillStyle = 'rgba(5, 1, 10, 0.78)';
            ctx.fillRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

            // Testo Game Over con bagliore rosso neon
            ctx.save();
            ctx.textAlign = 'center';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff0055';
            ctx.font = '900 86px "Orbitron", sans-serif';
            ctx.fillStyle = '#ff0055';
            ctx.fillText("GAME OVER", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 100);
            ctx.restore();

            // Box riassunto punteggi
            let boxW = 400;
            let boxH = 150;
            let boxX = LOGICAL_WIDTH / 2 - boxW / 2;
            let boxY = LOGICAL_HEIGHT / 2 - 40;

            ctx.save();
            ctx.fillStyle = 'rgba(16, 6, 36, 0.9)';
            ctx.strokeStyle = 'rgba(255, 0, 85, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxW, boxH, 12);
            ctx.fill();
            ctx.stroke();

            // Testi punteggi interni al box
            ctx.textAlign = 'center';
            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`PUNTEGGIO: ${score}`, LOGICAL_WIDTH / 2, boxY + 55);

            ctx.font = 'bold 24px "Orbitron", sans-serif';
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ffff';
            ctx.fillText(`RECORD: ${bestScore}`, LOGICAL_WIDTH / 2, boxY + 110);
            ctx.restore();

            // Scritta "Tocca per riprovare" pulsante
            ctx.save();
            ctx.textAlign = 'center';
            ctx.font = '600 20px "Outfit", sans-serif';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            let pulse = Math.abs(Math.sin(Date.now() * 0.005));
            ctx.globalAlpha = 0.4 + pulse * 0.6;
            ctx.fillText("Tocca ovunque per riprovare", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 170);
            ctx.restore();
        }

        // --- GESTIONE DEI FLUSSI ED EVENTI ---
        
        function triggerGameOver() {
            gameState = STATE_GAMEOVER;
            Sound.playDeath();
            BGM.stop(); // Ferma la musica di sottofondo
            
            // Screen shake forte all'impatto
            shakeTime = 25;
            shakeIntensity = 20;

            // Genera l'esplosione di particelle
            spawnDeathExplosion(player.x + player.width / 2, player.y + player.height / 2);

            // Aggiorna e salva il record locale
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('ninja_best_score', bestScore);
            }
        }

        function restartGame() {
            // Reimposta le variabili di gioco
            score = 0;
            gameFrames = 0;
            gameTime = 0;
            timeScale = 1.0;
            dashEnergy = 100;
            gameObjects = [];
            particles = [];
            popups = [];
            obstacleTimer = 100;
            doubleObstacleQueued = false;
            
            player.reset();
            gameState = STATE_PLAYING;
            Sound.playScore(); // Chime di avvio rapido
            BGM.start(); // Avvia la musica di sottofondo
        }

        // Gestione degli input generalizzata
        function onPress() {
            if (gameState === STATE_START) {
                // Primo avvio del gioco
                Sound.playScore();
                gameState = STATE_PLAYING;
                tutorialDismissed = true;
                obstacleTimer = 180; // Dà qualche secondo prima del primo spawn
                BGM.start(); // Avvia la musica di sottofondo procedurale
            } else if (gameState === STATE_GAMEOVER) {
                // Riavvio istantaneo dopo il Game Over
                restartGame();
            } else if (gameState === STATE_PLAYING) {
                isPressing = true;
                pressDuration = 0;
                // Salto immediato su tap
                player.jump();
            }
        }

        function onRelease() {
            if (gameState === STATE_PLAYING) {
                isPressing = false;
                pressDuration = 0;
            }
        }

        // Associazione eventi per Mobile (Touch) e PC (Mouse)
        // Disabilitazione comportamenti di default come scrolling
        canvas.addEventListener('touchstart', (e) => {
            touchActive = true;
            onPress();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            onRelease();
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            if (touchActive) return; // Salta se il touch è attivo su mobile
            onPress();
        });

        window.addEventListener('mouseup', (e) => {
            if (touchActive) return;
            onRelease();
        });

        // Blocco menu contestuale del mouse (ottimizzazione mobile)
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });


        // --- LOOP PRINCIPALE DI GIOCO (Game Loop) ---
        function gameLoop() {
            // Salva lo stato del canvas per gestire lo Screen Shake
            ctx.save();

            // Applicazione dello Screen Shake se attivo
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            // Aggiorna lo schema dei colori in base alla fase corrente (Color Shift)
            if (currentPhase === 3) {
                primaryColor = '#ff0055'; // Rosso Neon
                secondaryColor = '#ffaa00'; // Oro Neon
            } else {
                primaryColor = '#bd00ff'; // Viola Neon
                secondaryColor = '#00ffff'; // Ciano Neon
            }

            // 1. Rendering Sfondo Parallasse
            drawBackground();

            if (gameState === STATE_PLAYING) {
                gameFrames++;
                // Avanzamento tempo modulato dal timeScale
                gameTime += (1 / 60) * timeScale;
                // Scorrimento progressivo della griglia del terreno
                scrollX += 7 * timeScale;

                // Incremento punteggio progressivo basato sulla sopravvivenza
                if (gameFrames % 15 === 0) {
                    score += 1;
                }

                // Incremento contatore pressione input
                if (isPressing) {
                    pressDuration++;
                    if (pressDuration === 9) {
                        // Suona l'effetto del dash al momento dell'attivazione
                        Sound.playDash();
                    }
                }

                // 2. Gestione Logica ed Entità
                player.update();
                updateObstacleSpawning();
                updateDashEnergy();
            }

            // Aggiorna elementi, particelle e popup in qualsiasi stato (permettere animazioni residue al Game Over)
            updateAndDrawGameObjects();
            updateAndDrawParticles();
            updateAndDrawPopups();

            // 3. Rendering Elementi Primari
            player.draw();
            drawFloorGrid();
            
            // Ripristina la matrice del canvas raddrizzando lo screen shake prima di disegnare l'interfaccia statica
            ctx.restore();

            // 4. Rendering HUD ed Interfacce Esterne allo Shake
            if (gameState === STATE_PLAYING) {
                drawHUD();
                
                // Tutorial invisibile con dissolvenza graduale (fade-out)
                if (tutorialDismissed && tutorialAlpha > 0) {
                    tutorialAlpha -= 0.04;
                }
                
                if (tutorialAlpha > 0) {
                    ctx.save();
                    ctx.fillStyle = `rgba(255, 255, 255, ${tutorialAlpha})`;
                    ctx.font = '900 36px "Orbitron", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = 'rgba(0, 255, 255, 0.4)';
                    ctx.fillText("TAP TO JUMP", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 35);
                    ctx.fillText("HOLD TO DASH", LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 + 35);
                    ctx.restore();
                }
            } else if (gameState === STATE_START) {
                drawStartScreen();
            } else if (gameState === STATE_GAMEOVER) {
                drawHUD(); // Mostra comunque l'HUD congelato in background
                drawGameOverScreen();
            }

            // Ciclo loop continuo standard di HTML5
            requestAnimationFrame(gameLoop);
        }

        // Avvio iniziale del ciclo
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
